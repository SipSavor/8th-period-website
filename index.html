<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Citizen Portal for the Kingdom of 8th Period">
    <title>Kingdom of 8th Period | Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.25);
            --accent: #f59e0b;
            --bg-main: #020617; 
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-border-hover: rgba(129, 140, 248, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(192, 132, 252, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: sticky; top: 0; z-index: 1000; background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(20px); padding: 1.25rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--card-border);
        }

        .nav-logo {
            font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #e2e8f0 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-main); }

        .hero { text-align: center; padding: 120px 20px 60px; animation: slideUp 0.8s ease-out; }
        .hero h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 1rem; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(to right bottom, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-muted); font-size: clamp(1rem, 4vw, 1.25rem); max-width: 600px; margin: 0 auto; margin-bottom: 2rem; }

        .container { max-width: 1200px; margin: 0 auto 100px; padding: 0 24px; }
        .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
        
        .portal-card {
            background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 24px;
            padding: 40px 32px; text-decoration: none; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; backdrop-filter: blur(12px); position: relative; overflow: hidden; color: var(--text-main);
        }

        .portal-card:hover { transform: translateY(-6px); border-color: var(--card-border-hover); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px var(--primary-glow); }

        .icon-circle { width: 64px; height: 64px; background: rgba(255, 255, 255, 0.04); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; margin-bottom: 24px; border: 1px solid var(--card-border); transition: 0.5s; }
        .portal-card:hover .icon-circle { background: var(--primary); color: #020617; transform: scale(1.1) rotate(-5deg); }

        .badge-new { font-size: 0.45em; background: var(--danger); color: white; padding: 4px 8px; border-radius: 12px; vertical-align: middle; margin-left: 8px; font-weight: 800; letter-spacing: 1px;}

        footer { padding: 40px 20px 60px; text-align: center; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; border-top: 1px solid var(--card-border); opacity: 0.7; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 1.5rem; text-align: center; }
            .nav-links { gap: 1rem; flex-wrap: wrap; justify-content: center; }
        }

        /* --- Buttons & Modal --- */
        .auth-btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 1rem; }
        .btn-primary { background: var(--primary); color: #020617; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid var(--card-border); }
        .btn-secondary:hover { background: var(--card-border-hover); border-color: var(--primary); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }
        .btn-save { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); display: none; margin-left: 10px;}

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg-main);
