<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Kingdom of 8th Period</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg-main: #020617;
            --surface-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }

        .auth-container {
            background: var(--surface-bg);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .auth-container h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e2e8f0 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-container p {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-group { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #020617;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .toggle-text span {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: color 0.2s;
        }
        
        .toggle-text span:hover { color: var(--text-main); }

        #error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        /* Hide elements by default based on mode */
        .signup-only { display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="auth-title">Enter the Kingdom</h1>
        <p id="auth-subtitle">Verify your identity to proceed.</p>

        <div class="input-group">
            <input type="text" id="citizen-name" class="signup-only" placeholder="Chosen Citizen Name (e.g. Sir Dallas)">
            <input type="email" id="email" placeholder="School Email Address">
            <input type="password" id="password" placeholder="Secure Password">
        </div>

        <button id="auth-btn" onclick="handleAuth()">Establish Link</button>
        <div id="error-msg"></div>

        <div class="toggle-text">
            <span id="toggle-mode-text">New citizen? Register here.</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIsdB35U2clkR3b8bYdWNxRI14A9aGj-k",
            authDomain: "chatting-kingdom.firebaseapp.com",
            databaseURL: "https://chatting-kingdom-default-rtdb.firebaseio.com",
            projectId: "chatting-kingdom",
            storageBucket: "chatting-kingdom.firebasestorage.app",
            messagingSenderId: "159434733757",
            appId: "1:159434733757:web:e86256ba72525c0830dfd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLoginMode = true;

        // Auto-redirect if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "news.html"; // Redirects to news dashboard once logged in
            }
        });

        // Toggle between Login and Sign Up UI
        document.getElementById('toggle-mode-text').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Enter the Kingdom" : "Citizen Registration";
            document.getElementById('auth-subtitle').innerText = isLoginMode ? "Verify your identity to proceed." : "Claim your identity and rank.";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Establish Link" : "Swear Allegiance (Register)";
            document.getElementById('toggle-mode-text').innerText = isLoginMode ? "New citizen? Register here." : "Already registered? Enter here.";
            
            const signupFields = document.querySelectorAll('.signup-only');
            signupFields.forEach(field => field.style.display = isLoginMode ? 'none' : 'block');
            document.getElementById('error-msg').innerText = "";
        });

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const citizenName = document.getElementById('citizen-name').value;
            const errorDiv = document.getElementById('error-msg');
            const btn = document.getElementById('auth-btn');

            if (!email || !password || (!isLoginMode && !citizenName)) {
                errorDiv.innerText = "All fields are required.";
                return;
            }

            btn.innerText = "Processing...";
            errorDiv.innerText = "";

            try {
                if (isLoginMode) {
                    // LOGIN LOGIC
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    // SIGNUP LOGIC
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    // Create their permanent ID card in Firestore
                    await setDoc(doc(db, "users", user.uid), {
                        name: citizenName,
                        email: email,
                        role: "citizen",     // Web team or King can upgrade this later
                        rank: "Peasant",     // Default starting rank
                        wealth: 0,           // Setup for the economy page later
                        joinedAt: new Date().toISOString()
                    });
                }
                // The onAuthStateChanged listener at the top will automatically redirect them now!
            } catch (error) {
                console.error(error);
                errorDiv.innerText = error.message.replace("Firebase: ", "");
                btn.innerText = isLoginMode ? "Establish Link" : "Swear Allegiance (Register)";
            }
        };
    </script>
</body>
</html>
