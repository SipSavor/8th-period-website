<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal | Echo Messaging</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-glow: rgba(99, 102, 241, 0.2);
            --bg-main: #020617; 
            --card-bg: #0f172a;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --nav-bg: rgba(2, 6, 23, 0.85);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Navigation Styling */
        nav {
            padding: 1rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--nav-bg);
            backdrop-filter: blur(16px);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 10px;
            display: grid;
            place-items: center;
            color: white;
        }

        /* Main Content Wrapper */
        .portal-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 80px; /* Offset for fixed nav */
        }

        .blob {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 60%);
            filter: blur(80px);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        .portal-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .card-logo-center {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: grid;
            place-items: center;
            color: white;
            font-weight: 800;
            margin: 0 auto 12px auto;
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
        p.subtitle { color: var(--text-muted); text-align: center; font-size: 0.9rem; margin-bottom: 24px; }

        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        
        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        .form-control:focus { outline: none; border-color: var(--primary); }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-1px); opacity: 0.9; }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .toggle-text span { color: var(--primary-light); cursor: pointer; font-weight: 600; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">E</div>
            Echo Messaging
        </a>
        <div id="nav-user-area">
            <a href="portal.html" class="btn btn-primary" id="portal-btn" style="padding: 8px 18px; font-size: 0.85rem;">Portal</a>
        </div>
    </nav>

    <div class="portal-container">
        <div class="blob"></div>

        <div class="portal-card">
            <div class="card-logo-center">E</div>
            
            <div id="login-section">
                <h1>welcome back</h1>
                <p class="subtitle">log in to see what's happening</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>username</label>
                        <input type="text" id="login-user" class="form-control" placeholder="your name" required>
                    </div>
                    <div class="form-group">
                        <label>passkey</label>
                        <input type="password" id="login-pass" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">sign in</button>
                </form>
                <p class="toggle-text">new here? <span onclick="toggleForm()">create an account</span></p>
            </div>

            <div id="register-section" class="hidden">
                <h1>join the echo</h1>
                <p class="subtitle">create your kingdom identity</p>
                <form id="register-form">
                    <div class="form-group">
                        <label>choose username</label>
                        <input type="text" id="reg-user" class="form-control" placeholder="coolname123" required>
                    </div>
                    <div class="form-group">
                        <label>set passkey</label>
                        <input type="password" id="reg-pass" class="form-control" placeholder="make it strong" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">create account</button>
                </form>
                <p class="toggle-text">already a citizen? <span onclick="toggleForm()">log in</span></p>
            </div>
        </div>
    </div>

    <script>
        // Check if someone is logged in for the Nav Bar
        const user = sessionStorage.getItem('currentUser');
        if(user) {
            document.getElementById('nav-user-area').innerHTML = `
                <span style="margin-right:15px; font-weight:600; font-size:0.9rem;">👋 hi, ${user}</span>
                <button onclick="logout()" class="btn btn-secondary" style="padding: 5px 12px; font-size: 0.75rem; margin:0;">Logout</button>
            `;
        }

        function logout() {
            sessionStorage.clear();
            window.location.reload();
        }

        function toggleForm() {
            document.getElementById('login-section').classList.toggle('hidden');
            document.getElementById('register-section').classList.toggle('hidden');
        }

        // REGISTER LOGIC
        document.getElementById('register-form').onsubmit = function(e) {
            e.preventDefault();
            const userVal = document.getElementById('reg-user').value;
            const passVal = document.getElementById('reg-pass').value;

            if(localStorage.getItem(userVal)) {
                alert("That name is taken, choose another!");
            } else {
                localStorage.setItem(userVal, passVal);
                alert("Account created! Now you can sign in.");
                toggleForm();
            }
        };

        // LOGIN LOGIC
        document.getElementById('login-form').onsubmit = function(e) {
            e.preventDefault();
            const userVal = document.getElementById('login-user').value;
            const passVal = document.getElementById('login-pass').value;
            const storedPass = localStorage.getItem(userVal);

            if (storedPass && storedPass === passVal) {
                sessionStorage.setItem('currentUser', userVal);
                window.location.href = 'index.html';
            } else {
                alert("Access Denied. Check your name or passkey.");
            }
        };
    </script>
</body>
</html>
