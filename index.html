<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sophia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Lora:ital@1&display=swap" rel="stylesheet">
    
    <style>
        /* Deep Romantic Night Sky Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
            perspective: 1000px; 
            color: #ffffff; /* Sets default text color to white for the dark theme */
        }

        /* The Canvas for the Constellations */
        #starCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Enhanced Glass Card with 3D settings adjusted for dark mode */
        .card {
            background: rgba(255, 255, 255, 0.08); /* More transparent for dark mode */
            padding: 50px 60px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), 
                        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            max-width: 500px;
            width: 85%;
            z-index: 10;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
        }

        /* Time of day greeting */
        #greeting {
            font-size: 1.2rem;
            color: #d1c4e9;
            font-weight: 400;
            margin: 0 0 -10px 0;
            font-style: italic;
            transform: translateZ(20px);
        }

        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            margin: 0 0 15px 0;
            font-weight: 600;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            transform: translateZ(30px);
        }

        .name {
            color: #ff477e;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(255, 71, 126, 0.5); /* Makes her name glow slightly */
        }

        .heart {
            display: inline-block;
            color: #ff477e;
            animation: pulse 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 71, 126, 0.6));
            cursor: pointer;
            user-select: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .btn {
            background: linear-gradient(45deg, #ff477e, #ff758c);
            color: #ffffff;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
            transform: translateZ(20px);
        }

        .btn:hover {
            transform: translateZ(25px) scale(1.05);
            box-shadow: 0 12px 25px rgba(255, 71, 126, 0.6);
        }

        .poem-container {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s ease-in-out;
            transform: translateZ(15px);
        }

        .poem-container.show {
            max-height: 500px;
            opacity: 1;
            margin-top: 35px;
        }

        .poem {
            color: #f0f0f0;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: 'Lora', serif;
            font-style: italic;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ff477e;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .mini-heart {
            position: absolute;
            pointer-events: none;
            animation: flyOut 1s ease-out forwards;
            z-index: 50;
            font-size: 1.5rem;
        }

        @keyframes flyOut {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .card { padding: 40px 25px; }
            .poem { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <audio id="bgMusic" loop>
        <source src="sonican-lo-fi-music-loop-sentimental-jazzy-love-473154.mp3" type="audio/mpeg">
    </audio>

    <div class="card" id="glassCard">
        <h2 id="greeting">Hello,</h2>
        
        <h1>I Love <span class="name">Sophia</span> <span class="heart" id="mainHeart">❤️</span></h1>
        
        <button class="btn" id="revealBtn">Read my poem</button>

        <div class="poem-container" id="poemBox">
            <p class="poem"><span id="poemText"></span><span class="cursor" id="cursor"></span></p>
        </div>
    </div>

    <script>
        // --- TIME OF DAY GREETING LOGIC ---
        const greetingElement = document.getElementById('greeting');
        const currentHour = new Date().getHours();
        
        if (currentHour < 12) {
            greetingElement.textContent = "Good morning, beautiful.";
        } else if (currentHour < 18) {
            greetingElement.textContent = "Good afternoon, my love.";
        } else {
            greetingElement.textContent = "Good evening, my love.";
        }

        // --- INTERACTIVE STARRY NIGHT CANVAS LOGIC ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray = [];
        let mouse = {
            x: null,
            y: null,
            radius: 150 // How far the lines will reach towards the mouse/finger
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Add touch support for phones
        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });
        window.addEventListener('touchend', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fill();
            }
            update() {
                if(this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if(this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;
                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            // Calculate particles based on screen size (keeps mobile running smoothly)
            let numberOfParticles = Math.min(100, (canvas.height * canvas.width) / 10000);
            for(let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.4) - 0.2;
                let directionY = (Math.random() * 0.4) - 0.2;
                particlesArray.push(new Particle(x, y, directionX, directionY, size));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for(let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        function connect() {
            let opacityValue = 1;
            // Draw lines between stars
            for(let a = 0; a < particlesArray.length; a++) {
                for(let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x)) + 
                                   ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if(distance < (canvas.width / 7) * (canvas.height / 7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(255, 255, 255,' + (opacityValue * 0.2) + ')'; // faint white lines
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
                
                // Draw glowing pink lines connecting stars to her mouse/finger
                if(mouse.x && mouse.y) {
                    let dx = mouse.x - particlesArray[a].x;
                    let dy = mouse.y - particlesArray[a].y;
                    let distanceToMouse = Math.sqrt(dx * dx + dy * dy);
                    
                    if(distanceToMouse < mouse.radius) {
                        ctx.beginPath();
                        // Pink lines that fade as they get further from the cursor
                        ctx.strokeStyle = 'rgba(255, 71, 126,' + (1 - distanceToMouse / mouse.radius) + ')'; 
                        ctx.lineWidth = 1.5;
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }
        }

        window.addEventListener('resize', function() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });

        init();
        animate();

        // --- 3D TILT EFFECT LOGIC ---
        const card = document.getElementById('glassCard');

        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left - (rect.width / 2);
            const y = e.clientY - rect.top - (rect.height / 2);
            const rotateX = (y / (rect.height / 2)) * -10; 
            const rotateY = (x / (rect.width / 2)) * 10;   
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            card.style.transition = 'none';
        });

        card.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg)`;
            card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        });

        // --- POEM AND MUSIC LOGIC ---
        const btn = document.getElementById('revealBtn');
        const poemBox = document.getElementById('poemBox');
        const poemTextElement = document.getElementById('poemText');
        const cursor = document.getElementById('cursor');
        const bgMusic = document.getElementById('bgMusic');
        const mainHeart = document.getElementById('mainHeart');

        const fullPoem = "In every quiet moment,\nIn every crowded room,\nYou’re the light that finds its way\nTo clear away the gloom.\n\nIt isn’t just the way you laugh,\nOr how you say my name;\nIt’s that since the day I met you,\nI’ve never been the same.";
        
        let i = 0;
        let isTyping = false;
        let poemRevealed = false;

        function typeWriter() {
            if (i < fullPoem.length) {
                poemTextElement.textContent += fullPoem.charAt(i);
                i++;
                setTimeout(typeWriter, 40); 
            } else {
                isTyping = false;
                cursor.style.display = 'none'; 
            }
        }

        btn.addEventListener('click', function() {
            if (bgMusic.paused) {
                bgMusic.volume = 0.4;
                bgMusic.play();
            }

            if (!poemRevealed) {
                poemBox.classList.add('show');
                btn.textContent = "Close poem";
                poemRevealed = true;
                
                if (i === 0) {
                    isTyping = true;
                    setTimeout(typeWriter, 500);
                }
            } else {
                poemBox.classList.remove('show');
                btn.textContent = "Read my poem";
                poemRevealed = false;
            }
        });

        // --- INTERACTIVE HEART EXPLOSION LOGIC ---
        mainHeart.addEventListener('click', function(e) {
            for(let j = 0; j < 10; j++) {
                const miniHeart = document.createElement('div');
                miniHeart.classList.add('mini-heart');
                miniHeart.innerText = '💖';
                
                miniHeart.style.left = e.clientX + 'px';
                miniHeart.style.top = e.clientY + 'px';

                const tx = (Math.random() - 0.5) * 200 + 'px';
                const ty = (Math.random() - 0.5) * 200 + 'px';
                const rot = Math.random() * 360 + 'deg';

                miniHeart.style.setProperty('--tx', tx);
                miniHeart.style.setProperty('--ty', ty);
                miniHeart.style.setProperty('--rot', rot);

                document.body.appendChild(miniHeart);

                setTimeout(() => {
                    miniHeart.remove();
                }, 1000);
            }
        });
    </script>

</body>
</html>
