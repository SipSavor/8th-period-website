<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sophia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Lora:ital@1&display=swap" rel="stylesheet">
    
    <style>
        /* UPGRADE 1: Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* UPGRADE 2: Enhanced Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px 60px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 500px;
            width: 85%;
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        h1 {
            font-size: 3.5rem;
            color: #333;
            margin: 0 0 15px 0;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .name {
            color: #ff477e;
            font-weight: 800;
        }

        .heart {
            display: inline-block;
            color: #ff477e;
            animation: pulse 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 71, 126, 0.4));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .btn {
            background: linear-gradient(45deg, #ff477e, #ff758c);
            color: #ffffff;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 71, 126, 0.5);
        }

        .poem-container {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s ease-in-out;
        }

        .poem-container.show {
            max-height: 500px;
            opacity: 1;
            margin-top: 35px;
        }

        /* UPGRADE 3: Better Typography for the Poem */
        .poem {
            color: #444;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: 'Lora', serif; /* A more elegant, romantic font for the poem */
            font-style: italic;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            white-space: pre-wrap; /* Preserves line breaks in JS */
        }

        /* Blinking cursor for typewriter effect */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ff477e;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .card { padding: 40px 25px; }
            .poem { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>I Love <span class="name">Sophia</span> <span class="heart">❤️</span></h1>
        
        <button class="btn" id="revealBtn">Read my poem</button>

        <div class="poem-container" id="poemBox">
            <p class="poem"><span id="poemText"></span><span class="cursor" id="cursor"></span></p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('revealBtn');
        const poemBox = document.getElementById('poemBox');
        const poemTextElement = document.getElementById('poemText');
        const cursor = document.getElementById('cursor');

        // The poem stored in a variable. \n creates a line break.
        const fullPoem = "In every quiet moment,\nIn every crowded room,\nYou’re the light that finds its way\nTo clear away the gloom.\n\nIt isn’t just the way you laugh,\nOr how you say my name;\nIt’s that since the day I met you,\nI’ve never been the same.";
        
        let i = 0;
        let isTyping = false;
        let poemRevealed = false;

        // Typewriter function
        function typeWriter() {
            if (i < fullPoem.length) {
                poemTextElement.textContent += fullPoem.charAt(i);
                i++;
                setTimeout(typeWriter, 40); // 40ms delay between letters - adjust for speed
            } else {
                isTyping = false;
                cursor.style.display = 'none'; // Hide cursor when done
            }
        }

        btn.addEventListener('click', function() {
            if (!poemRevealed) {
                // Open the box and start typing
                poemBox.classList.add('show');
                btn.textContent = "Close poem";
                poemRevealed = true;
                
                // Only start typing if it hasn't been typed yet
                if (i === 0) {
                    isTyping = true;
                    // Add a slight delay before typing starts so the box can open first
                    setTimeout(typeWriter, 500);
                }
            } else {
                // Close the box
                poemBox.classList.remove('show');
                btn.textContent = "Read my poem";
                poemRevealed = false;
            }
        });
    </script>

</body>
</html>
