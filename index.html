<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sophia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Lora:ital@1&display=swap" rel="stylesheet">
    
    <style>
        /* Animated Gradient Background */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Enhanced Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.4);
            padding: 50px 60px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), 
                        inset 0 0 0 2px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 500px;
            width: 85%;
            z-index: 10;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            font-size: 3.5rem;
            color: #333;
            margin: 0 0 15px 0;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
        }

        .name {
            color: #ff477e;
            font-weight: 800;
        }

        /* The clickable pulsing heart */
        .heart {
            display: inline-block;
            color: #ff477e;
            animation: pulse 1.2s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(255, 71, 126, 0.4));
            cursor: pointer;
            user-select: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .btn {
            background: linear-gradient(45deg, #ff477e, #ff758c);
            color: #ffffff;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
        }

        .btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 71, 126, 0.5);
        }

        .poem-container {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s ease-in-out;
        }

        .poem-container.show {
            max-height: 500px;
            opacity: 1;
            margin-top: 35px;
        }

        .poem {
            color: #444;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: 'Lora', serif;
            font-style: italic;
            margin: 0;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ff477e;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Floating Background Particles */
        .particle {
            position: absolute;
            bottom: -50px;
            pointer-events: none;
            opacity: 0;
            animation: floatUp 8s ease-in infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* Tiny hearts that explode when clicking the main heart */
        .mini-heart {
            position: absolute;
            pointer-events: none;
            animation: flyOut 1s ease-out forwards;
            z-index: 50;
            font-size: 1.5rem;
        }

        @keyframes flyOut {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot)); opacity: 0; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .card { padding: 40px 25px; }
            .poem { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="sonican-lo-fi-music-loop-sentimental-jazzy-love-473154.mp3" type="audio/mpeg">
    </audio>

    <div class="card">
        <h1>I Love <span class="name">Sophia</span> <span class="heart" id="mainHeart">❤️</span></h1>
        
        <button class="btn" id="revealBtn">Read my poem</button>

        <div class="poem-container" id="poemBox">
            <p class="poem"><span id="poemText"></span><span class="cursor" id="cursor"></span></p>
        </div>
    </div>

    <script>
        // --- POEM AND MUSIC LOGIC ---
        const btn = document.getElementById('revealBtn');
        const poemBox = document.getElementById('poemBox');
        const poemTextElement = document.getElementById('poemText');
        const cursor = document.getElementById('cursor');
        const bgMusic = document.getElementById('bgMusic');
        const mainHeart = document.getElementById('mainHeart');

        const fullPoem = "In every quiet moment,\nIn every crowded room,\nYou’re the light that finds its way\nTo clear away the gloom.\n\nIt isn’t just the way you laugh,\nOr how you say my name;\nIt’s that since the day I met you,\nI’ve never been the same.";
        
        let i = 0;
        let isTyping = false;
        let poemRevealed = false;

        function typeWriter() {
            if (i < fullPoem.length) {
                poemTextElement.textContent += fullPoem.charAt(i);
                i++;
                setTimeout(typeWriter, 40); 
            } else {
                isTyping = false;
                cursor.style.display = 'none'; 
            }
        }

        btn.addEventListener('click', function() {
            if (bgMusic.paused) {
                bgMusic.volume = 0.4;
                bgMusic.play();
            }

            if (!poemRevealed) {
                poemBox.classList.add('show');
                btn.textContent = "Close poem";
                poemRevealed = true;
                
                if (i === 0) {
                    isTyping = true;
                    setTimeout(typeWriter, 500);
                }
            } else {
                poemBox.classList.remove('show');
                btn.textContent = "Read my poem";
                poemRevealed = false;
            }
        });

        // --- BACKGROUND FLOATING PARTICLES LOGIC ---
        function createParticles() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const types = ['🤍', '✨', '💖'];
            particle.innerText = types[Math.floor(Math.random() * types.length)];
            
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = Math.random() * 5 + 5 + 's'; 
            particle.style.fontSize = Math.random() * 20 + 10 + 'px'; 
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 10000);
        }

        setInterval(createParticles, 400);

        // --- INTERACTIVE HEART EXPLOSION LOGIC ---
        mainHeart.addEventListener('click', function(e) {
            for(let j = 0; j < 10; j++) {
                const miniHeart = document.createElement('div');
                miniHeart.classList.add('mini-heart');
                miniHeart.innerText = '💖';
                
                miniHeart.style.left = e.clientX + 'px';
                miniHeart.style.top = e.clientY + 'px';

                const tx = (Math.random() - 0.5) * 200 + 'px';
                const ty = (Math.random() - 0.5) * 200 + 'px';
                const rot = Math.random() * 360 + 'deg';

                miniHeart.style.setProperty('--tx', tx);
                miniHeart.style.setProperty('--ty', ty);
                miniHeart.style.setProperty('--rot', rot);

                document.body.appendChild(miniHeart);

                setTimeout(() => {
                    miniHeart.remove();
                }, 1000);
            }
        });
    </script>

</body>
</html>
