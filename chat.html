<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Comms | Kingdom of 8th Period</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --bg-main: #020617;
            --surface-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 40%);
        }

        /* --- NAVIGATION --- */
        nav {
            background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(20px);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--card-border);
        }

        .nav-logo {
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #e2e8f0 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; margin-left: 1.5rem; transition: 0.3s;}
        .nav-links a:hover { color: var(--text-main); }

        /* --- CHAT LAYOUT --- */
        .chat-wrapper { display: flex; gap: 24px; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; height: calc(100vh - 70px); }

        .sidebar {
            width: 300px; background: var(--surface-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 24px; backdrop-filter: blur(12px); display: flex; flex-direction: column; gap: 20px;
        }

        .chat-main {
            flex: 1; background: var(--surface-bg); border: 1px solid var(--card-border);
            border-radius: 20px; backdrop-filter: blur(12px); display: flex; flex-direction: column; overflow: hidden;
        }

        h3 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 12px; border-bottom: 1px solid var(--card-border); padding-bottom: 8px;}

        /* --- IDENTITY TAG --- */
        .identity-badge {
            background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--accent); padding: 12px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 0.9rem;
        }

        .server-status {
            background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.3);
            color: #34d399; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; font-size: 0.85rem;
        }

        /* --- MESSAGES AREA --- */
        #chat-box { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .message.system { background: rgba(255,255,255,0.05); color: var(--text-muted); align-self: center; text-align: center; font-style: italic; font-size: 0.8rem; }
        .message.them { background: rgba(129, 140, 248, 0.15); border: 1px solid rgba(129, 140, 248, 0.3); align-self: flex-start; border-bottom-left-radius: 2px;}
        .message.me { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .msg-author { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; opacity: 0.8; }

        .input-area { padding: 20px; border-top: 1px solid var(--card-border); display: flex; gap: 12px; background: rgba(0,0,0,0.2); }
        .input-area input { flex: 1; padding: 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--card-border); border-radius: 10px; color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s;}
        .input-area input:focus { border-color: var(--primary); }
        
        .input-area button { padding: 0 24px; background: var(--primary); color: #020617; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;}
        .input-area button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom Comms</div>
        <div class="nav-links">
            <a href="index.html">Portal</a>
            <a href="news.html">News</a>
            <a href="ranks.html">Ranks</a>
            <a href="economy.html">Economy</a>
            <a href="#" onclick="logout()">Disconnect</a>
        </div>
    </nav>

    <div class="chat-wrapper">
        <div class="sidebar">
            <div>
                <h3>Verified Identity</h3>
                <div class="identity-badge" id="display-name">Verifying Security Clearance...</div>
            </div>

            <div>
                <h3>Network Status</h3>
                <div class="server-status">🟢 Global Server Online<br><br><span style="color: var(--text-muted); font-size: 0.75rem;">Messages are permanently recorded by the Crown.</span></div>
            </div>
        </div>

        <div class="chat-main">
            <div id="chat-box">
                <div class="message system">Establishing connection to Kingdom servers...</div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Transmit a message to the realm..." disabled onkeypress="handleEnter(event)">
                <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIsdB35U2clkR3b8bYdWNxRI14A9aGj-k",
            authDomain: "chatting-kingdom.firebaseapp.com",
            databaseURL: "https://chatting-kingdom-default-rtdb.firebaseio.com",
            projectId: "chatting-kingdom",
            storageBucket: "chatting-kingdom.firebasestorage.app",
            messagingSenderId: "159434733757",
            appId: "1:159434733757:web:e86256ba72525c0830dfd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let myOfficialTitle = "";
        let currentUserUid = "";

        // --- SECURITY CHECK ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html"; 
            } else {
                currentUserUid = user.uid;
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        myOfficialTitle = `${data.name} [${data.rank}]`;
                        document.getElementById('display-name').innerText = myOfficialTitle;
                        
                        // Unlock the input box and load the chat
                        document.getElementById('message-input').disabled = false;
                        document.getElementById('send-btn').disabled = false;
                        listenForMessages(); 
                    }
                } catch (error) {
                    console.error("Identity Error:", error);
                }
            }
        });

        window.logout = () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        };

        // --- REAL-TIME FIRESTORE CHAT ---
        function listenForMessages() {
            const chatBox = document.getElementById('chat-box');
            
            // Look at the "messages" collection, sort them by oldest to newest
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));

            // onSnapshot runs immediately, AND whenever a new message is added by ANYONE
            onSnapshot(q, (snapshot) => {
                chatBox.innerHTML = ""; // Clear the box before redrawing
                
                if(snapshot.empty) {
                    chatBox.innerHTML = `<div class="message system">The realm is quiet. Be the first to speak.</div>`;
                    return;
                }

                snapshot.forEach((doc) => {
                    const msgData = doc.data();
                    // Check if WE sent the message, or if THEY sent it, to color it correctly
                    const type = msgData.uid === currentUserUid ? 'me' : 'them';
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${type}`;
                    msgDiv.innerHTML = `
                        <div class="msg-author">${msgData.author}</div>
                        <div>${msgData.text}</div>
                    `;
                    chatBox.appendChild(msgDiv);
                });

                // Auto-scroll to the bottom
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = ""; // Clear box instantly for good user experience

            try {
                // Write the new message to the database
                await addDoc(collection(db, "messages"), {
                    text: text,
                    author: myOfficialTitle,
                    uid: currentUserUid,
                    timestamp: serverTimestamp() // Uses Google's exact server time
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Failed to transmit. Check your connection.");
            }
        };

        window.handleEnter = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
</html>
