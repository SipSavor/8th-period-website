<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Pro Secure Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #121212; --side-bar: #1e1e1e; --chat-bg: #181818;
            --text-main: #e0e0e0; --accent: #0084ff; --received-bg: #333;
            --success: #2ecc71; --danger: #e74c3c;
        }

        body, html { margin: 0; padding: 0; height: 100dvh; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        .app-container { display: flex; height: 100dvh; width: 100vw; position: relative; }

        /* Mobile Header & Call Buttons */
        .mobile-header { display: flex; background: var(--side-bar); padding: 12px 20px; align-items: center; border-bottom: 1px solid #333; z-index: 5; gap: 10px;}
        .mobile-header h1 { margin: 0; font-size: 1.1rem; color: var(--accent); flex-grow: 1; text-align: center; }
        #menu-toggle { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0; }
        .header-btn { background: #333; border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 1.1rem;}
        .header-btn:hover { background: #444; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--side-bar); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 20; transition: transform 0.3s ease; }
        .sidebar h2 { font-size: 1.1rem; margin: 0 0 20px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .my-id-box { background: #2a2a2a; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; margin-bottom: 20px; cursor: pointer; border: 1px dashed #555; text-align: center;}
        
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; outline: none; font-size: 0.95rem; }
        .encryption-box { border-left: 3px solid var(--success); padding-left: 10px;}
        button.action-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button.action-btn:hover { filter: brightness(1.1); }
        .danger-btn { background: var(--danger); margin-top: 5px; }

        .member-section { flex-grow: 1; overflow-y: auto; }
        .member-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; margin-bottom: 12px; color: #bbb;}
        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; }

        /* Video Call UI */
        #video-ui { display: none; position: absolute; top: 70px; right: 20px; width: 220px; background: #000; border-radius: 12px; z-index: 50; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid #333;}
        .video-wrapper { position: relative; width: 100%; aspect-ratio: 3/4; background: #111; display: flex; flex-wrap: wrap;}
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; bottom: 10px; right: 10px; width: 70px; height: 100px; border-radius: 8px; border: 2px solid #555; z-index: 2;}
        .video-controls { display: flex; background: #222; padding: 10px; gap: 10px; justify-content: center;}
        .video-controls button { flex: 1; padding: 8px; border-radius: 6px; border: none; color: white; cursor: pointer; font-weight: bold;}
        #mute-btn { background: #333; }
        #end-call-btn { background: var(--danger); }

        /* Incoming Call Modal */
        .call-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .call-modal { background: #1e1e1e; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 250px; }
        .call-modal h3 { margin-top: 0; color: var(--accent); }
        .call-btn-group { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .call-btn-group button { padding: 10px 20px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
        #accept-call-btn { background: var(--success); }
        #reject-call-btn { background: var(--danger); }

        /* Main Chat */
        .sidebar-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 15; }
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative; width: 100%;}
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* Bubbles */
        .msg-row { display: flex; gap: 10px; max-width: 75%; animation: fadeIn 0.2s ease; position: relative; }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: flex-start; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background: #222; flex-shrink: 0; }
        .msg-container { display: flex; flex-direction: column; cursor: pointer; }
        .msg-row.sent .msg-container { align-items: flex-end; }
        .msg-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
        .msg-row.sent .msg-header { flex-direction: row-reverse; }
        .user-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); }
        .timestamp { font-size: 0.7rem; color: #888; }
        .receipt { font-size: 0.75rem; color: #888; margin-left: 4px; font-weight: bold;}
        .receipt.read { color: var(--accent); }

        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; word-break: break-word; line-height: 1.4; }
        .msg-row.sent .msg-bubble { background: var(--accent); color: white; border-top-right-radius: 2px; }
        .msg-row.received .msg-bubble { background: var(--received-bg); border-top-left-radius: 2px; }
        .media-content { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }

        .system { align-self: center; background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 12px; color: #aaa; font-size: 0.8rem; margin: 5px 0; text-align: center;}
        
        /* Bottom Area */
        .bottom-container { background: var(--side-bar); border-top: 1px solid #333; display: flex; flex-direction: column;}
        .message-input-area { padding: 10px 15px 15px 15px; display: flex; gap: 8px; align-items: center;}
        #msg-input { flex-grow: 1; padding: 12px; font-size: 1rem; border-radius: 20px;}
        #attach-btn { background: #333; border: none; font-size: 1.2rem; padding: 10px 14px; border-radius: 50%; color: white; cursor: pointer;}
        #send-btn { background: var(--accent); border: none; color: white; padding: 10px 18px; border-radius: 20px; font-weight: bold; cursor: pointer;}

        @media (max-width: 768px) {
            .mobile-header { display: flex; }
            .sidebar h2 { display: none; }
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 260px; transform: translateX(-100%); box-shadow: 2px 0 15px rgba(0,0,0,0.5); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .msg-row { max-width: 85%; }
            #video-ui { width: 140px; right: 10px; top: 60px;}
            #local-video { width: 40px; height: 60px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <h2>P2P Pro</h2>
        <div style="font-size: 0.75rem; color: #888; margin-bottom: 5px;">YOUR ID</div>
        <div class="my-id-box" id="my-id" title="Tap to copy!">Initializing...</div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Your Name" onchange="updateProfile()">
            <input type="text" id="join-id" placeholder="Friend's ID">
            <button id="action-btn" class="action-btn">Connect</button>
            
            <div class="encryption-box">
                <div style="font-size: 0.75rem; color: var(--success); margin-bottom: 5px;">🔒 E2E ENCRYPTION</div>
                <input type="password" id="room-pass" placeholder="Secret Room Password" style="width: 85%;">
            </div>

            <button id="clear-history-btn" class="action-btn danger-btn">🗑️ Clear History</button>
        </div>
        
        <div class="member-section">
            <h3>Members Online</h3>
            <div id="member-list"></div>
        </div>
    </div>

    <div class="main-chat">
        <div class="mobile-header">
            <button id="menu-toggle">☰</button>
            <h1>P2P Pro</h1>
            <button class="header-btn" onclick="startVideoCall()" title="Start Video Call">📹</button>
        </div>

        <div id="video-ui">
            <div class="video-wrapper" id="remote-videos-container">
                <video id="local-video" autoplay muted playsinline></video>
                </div>
            <div class="video-controls">
                <button id="mute-btn" onclick="toggleMute()">🎙️ Mute</button>
                <button id="end-call-btn" onclick="endCall()">❌ End</button>
            </div>
        </div>

        <div class="call-modal-overlay" id="incoming-call-overlay">
            <div class="call-modal">
                <h3>Incoming Video Call</h3>
                <p>From: <strong id="caller-name">Someone</strong></p>
                <div class="call-btn-group">
                    <button id="accept-call-btn">Accept</button>
                    <button id="reject-call-btn">Reject</button>
                </div>
            </div>
        </div>

        <div id="chat-box"></div>
        <div class="bottom-container">
            <div class="message-input-area">
                <input type="file" id="file-input" accept="image/*,video/*" hidden>
                <button id="attach-btn" title="Attach Media">📎</button>
                <input type="text" id="msg-input" placeholder="Message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- UI & Mobile Sidebar Logic ---
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    function toggleSidebar() { sidebar.classList.toggle('open'); overlay.classList.toggle('open'); }
    document.getElementById('menu-toggle').onclick = toggleSidebar;
    overlay.onclick = toggleSidebar;

    const chatBox = document.getElementById('chat-box');
    const myIdDisplay = document.getElementById('my-id');
    const memberListUI = document.getElementById('member-list');

    // --- State ---
    const peer = new Peer();
    let connections = []; // Array of direct connections (Mesh)
    let members = {}; // Dictionary of everyone in the room
    let chatHistory = JSON.parse(localStorage.getItem('p2p_chat_history_v7')) || [];

    // Load saved preferences
    if(localStorage.getItem('p2p_username')) document.getElementById('username').value = localStorage.getItem('p2p_username');
    if(localStorage.getItem('p2p_password')) document.getElementById('room-pass').value = localStorage.getItem('p2p_password');
    document.getElementById('room-pass').addEventListener('change', (e) => localStorage.setItem('p2p_password', e.target.value));

    // Render History on load
    chatHistory.forEach(msg => renderMessageUI(msg));
    setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 100);

    // --- Cryptography (E2E Encryption) ---
    async function getCryptoKey() {
        const pass = document.getElementById('room-pass').value;
        if (!pass) return null;
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), {name: "PBKDF2"}, false, ["deriveKey"]);
        return await crypto.subtle.deriveKey({name: "PBKDF2", salt: enc.encode("p2ppro_secure_salt"), iterations: 100000, hash: "SHA-256"}, keyMaterial, {name: "AES-GCM", length: 256}, false, ["encrypt", "decrypt"]);
    }

    async function securePackage(dataObj) {
        const key = await getCryptoKey();
        if(!key) return { __raw: dataObj };
        
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(JSON.stringify(dataObj));
        const encrypted = await crypto.subtle.encrypt({name: "AES-GCM", iv}, key, encoded);
        return { __encrypted: true, iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) };
    }

    async function secureUnpackage(payload) {
        if(payload.__raw) return payload.__raw;
        if(payload.__encrypted) {
            const key = await getCryptoKey();
            if(!key) return { type: 'SYSTEM', text: '🔒 Encrypted message received. Enter password to view.' };
            try {
                const ivArray = new Uint8Array(payload.iv);
                const dataArray = new Uint8Array(payload.data);
                const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv: ivArray}, key, dataArray);
                return JSON.parse(new TextDecoder().decode(decrypted));
            } catch(e) {
                return { type: 'SYSTEM', text: '🔒 Failed to decrypt message. Wrong password?' };
            }
        }
        return payload;
    }

    // --- PeerJS & FULL MESH Logic ---
    peer.on('open', id => { 
        myIdDisplay.innerText = id; 
        members[id] = getMyProfile(); 
        updateMemberList(); 
    });
    
    myIdDisplay.onclick = () => { 
        navigator.clipboard.writeText(myIdDisplay.innerText);
        const original = myIdDisplay.innerText;
        myIdDisplay.innerText = "Copied!";
        setTimeout(() => myIdDisplay.innerText = original, 1000);
    };

    function getMyProfile() { 
        return { name: document.getElementById('username').value.trim() || "Guest_" + (peer.id ? peer.id.substring(0,4) : "") }; 
    }

    function updateProfile() { 
        localStorage.setItem('p2p_username', document.getElementById('username').value); 
        members[peer.id] = getMyProfile(); 
        broadcastData({ type: 'HELO', profile: getMyProfile() }); // Tell everyone my new name
        updateMemberList();
    }

    // When someone initiates a connection to US
    peer.on('connection', conn => { 
        setupConnection(conn); 
    });

    // When WE initiate a connection to someone
    document.getElementById('action-btn').onclick = () => {
        const targetId = document.getElementById('join-id').value.trim();
        if (!targetId || targetId === peer.id) return;
        
        setupConnection(peer.connect(targetId));
        document.getElementById('action-btn').innerText = "Connected";
        if(window.innerWidth <= 768) toggleSidebar();
    };

    // The core connection handler that builds the Mesh
    function setupConnection(conn) {
        // Prevent duplicate connections if they spam click
        if (connections.some(c => c.peer === conn.peer)) return;
        connections.push(conn);

        const onOpen = () => {
            // Tell them who we are
            sendRawData(conn, { type: 'HELO', profile: getMyProfile() });
            // Share our full member list so they can connect to anyone they are missing
            sendRawData(conn, { type: 'MEMBER_LIST', list: members });
        };

        if (conn.open) onOpen();
        else conn.on('open', onOpen);

        conn.on('data', async encryptedPayload => {
            const data = await secureUnpackage(encryptedPayload);

            if (data.type === 'HELO') {
                members[conn.peer] = data.profile; 
                renderSystemMessage(`${data.profile.name} joined.`);
                updateMemberList();
            } 
            else if (data.type === 'MEMBER_LIST') {
                // Combine their list with our list
                members = { ...members, ...data.list };
                updateMemberList();
                
                // MESH MAGIC: Connect to anyone on the list we aren't connected to yet!
                Object.keys(members).forEach(id => {
                    if (id !== peer.id && !connections.some(c => c.peer === id)) {
                        console.log("Mesh networking: Reaching out to missing peer", id);
                        setupConnection(peer.connect(id));
                    }
                });
            }
            else if (data.type === 'CHAT') {
                renderMessageUI(data); 
                saveToHistory(data);
                sendRawData(conn, { type: 'READ_RECEIPT', msgId: data.msgId });
            }
            else if (data.type === 'READ_RECEIPT') {
                markMessageRead(data.msgId);
            }
            else if (data.type === 'SYSTEM') {
                renderSystemMessage(data.text);
            }
        });

        conn.on('close', () => handleDisconnection(conn));
        conn.on('error', () => handleDisconnection(conn));
    }

    // Safely remove a peer if they drop
    function handleDisconnection(conn) { 
        if (members[conn.peer]) {
            renderSystemMessage(`${members[conn.peer].name} left.`);
            delete members[conn.peer]; 
        }
        connections = connections.filter(c => c.peer !== conn.peer && c.open); 
        updateMemberList(); 
    }

    // Broadcasts an encrypted payload to ALL direct connections
    async function broadcastData(dataObj) {
        const payload = await securePackage(dataObj);
        connections.forEach(c => { if(c.open) c.send(payload); });
    }
    
    // Sends raw (unencrypted) data, usually for system/handshake info
    function sendRawData(conn, dataObj) { 
        if (conn.open) conn.send({ __raw: dataObj }); 
    }

    function updateMemberList() {
        memberListUI.innerHTML = '';
        Object.keys(members).forEach(id => {
            const el = document.createElement('div'); el.className = 'member-item';
            el.innerHTML = `<div class="status-dot"></div> <span>${members[id].name} ${id === peer.id ? '(You)' : ''}</span>`;
            memberListUI.appendChild(el);
        });
    }

    // --- Messaging & Read Receipts ---
    function markMessageRead(msgId) {
        const receiptEl = document.getElementById(`receipt-${msgId}`);
        if(receiptEl) {
            receiptEl.innerText = "✓✓";
            receiptEl.classList.add('read');
        }
        const msg = chatHistory.find(m => m.msgId === msgId);
        if(msg) { msg.read = true; localStorage.setItem('p2p_chat_history_v7', JSON.stringify(chatHistory)); }
    }

    document.getElementById('attach-btn').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = function() {
        const file = this.files[0]; if(!file) return;
        if(file.size > 5 * 1024 * 1024) return alert("Max 5MB file size.");
        const reader = new FileReader();
        reader.onload = e => sendPacket(e.target.result, file.type.startsWith('video') ? 'video' : 'image');
        reader.readAsDataURL(file); this.value = '';
    };

    function sendMessage() {
        const input = document.getElementById('msg-input');
        if (!input.value.trim()) return;
        sendPacket(input.value.trim(), 'text');
        input.value = "";
    }

    function sendPacket(content, mediaType = 'text') {
        const msgId = Date.now().toString(36) + Math.random().toString(36).substr(2);
        const data = { 
            type: 'CHAT', msgId, senderId: peer.id, 
            profile: getMyProfile(), time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), 
            text: mediaType === 'text' ? content : '', mediaData: mediaType !== 'text' ? content : null, mediaType, read: false
        };
        broadcastData(data);
        renderMessageUI(data); saveToHistory(data);
    }

    document.getElementById('clear-history-btn').onclick = () => { if(confirm("Clear local history?")) { chatHistory = []; localStorage.removeItem('p2p_chat_history_v7'); chatBox.innerHTML = ''; }};

    function saveToHistory(data) { chatHistory.push(data); if (chatHistory.length > 200) chatHistory.shift(); localStorage.setItem('p2p_chat_history_v7', JSON.stringify(chatHistory)); }

    function renderSystemMessage(text) {
        const wrapper = document.createElement('div'); wrapper.className = `system`; wrapper.innerText = text;
        chatBox.appendChild(wrapper); chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderMessageUI(data) {
        const isSentByMe = data.senderId === peer.id;
        const typeClass = isSentByMe ? "sent" : "received";
        const wrapper = document.createElement('div'); wrapper.className = `msg-row ${typeClass}`; wrapper.id = `msg-${data.msgId}`;
        const avatarUrl = `https://api.dicebear.com/9.x/bottts/svg?seed=${data.senderId}&backgroundColor=transparent`;

        let mediaHTML = '';
        if (data.mediaType === 'image') mediaHTML = `<img src="${data.mediaData}" class="media-content">`;
        else if (data.mediaType === 'video') mediaHTML = `<video src="${data.mediaData}" class="media-content" controls></video>`;

        let receiptHTML = isSentByMe ? `<span class="receipt ${data.read ? 'read' : ''}" id="receipt-${data.msgId}">${data.read ? '✓✓' : '✓'}</span>` : '';

        const safeText = data.text ? data.text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';

        wrapper.innerHTML = `
            <img src="${avatarUrl}" class="avatar" alt="avatar">
            <div class="msg-container">
                <div class="msg-header"><span class="user-label">${data.profile.name}</span><span class="timestamp">${data.time}${receiptHTML}</span></div>
                <div class="msg-bubble">${data.mediaType === 'text' ? safeText : mediaHTML}</div>
            </div>`;
        
        chatBox.appendChild(wrapper);
        if (chatBox.scrollHeight - chatBox.scrollTop < chatBox.clientHeight + 250) chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // --- WebRTC Video & Audio Calling ---
    let localStream = null;
    let activeCalls = [];
    let pendingCall = null;
    let isEndingCallLocal = false; // Flag to stop duplicate disconnect messages

    async function startVideoCall() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('video-ui').style.display = 'flex';
            
            if (connections.length === 0) {
                alert("No one is in the room to call!");
                return;
            }

            // MESH: Call everyone directly!
            connections.forEach(conn => {
                const call = peer.call(conn.peer, localStream);
                setupCallEvents(call);
            });
        } catch(err) {
            console.error(err);
            alert("Could not access Camera/Microphone. Are you using a local server (http://localhost)?");
        }
    }

    peer.on('call', (call) => {
        pendingCall = call;
        const callerName = members[call.peer]?.name || "Unknown User";
        document.getElementById('caller-name').innerText = callerName;
        document.getElementById('incoming-call-overlay').style.display = 'flex';
    });

    document.getElementById('accept-call-btn').onclick = async () => {
        document.getElementById('incoming-call-overlay').style.display = 'none';
        if (!pendingCall) return;

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            localStream = stream;
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('video-ui').style.display = 'flex';
            
            pendingCall.answer(stream);
            setupCallEvents(pendingCall);
        } catch(err) {
            console.error("Failed to answer call:", err);
            alert("Error accessing your camera.");
        }
        pendingCall = null;
    };

    document.getElementById('reject-call-btn').onclick = () => {
        document.getElementById('incoming-call-overlay').style.display = 'none';
        if (pendingCall) {
            renderSystemMessage(`📞 You declined the call from ${members[pendingCall.peer]?.name || 'Someone'}.`);
            pendingCall.close();
            pendingCall = null;
        }
    };

    function setupCallEvents(call) {
        activeCalls.push(call);
        let callAnswered = false;
        
        call.on('stream', remoteStream => {
            callAnswered = true;
            let remoteVid = document.getElementById(`vid-${call.peer}`);
            
            if (!remoteVid) {
                remoteVid = document.createElement('video');
                remoteVid.id = `vid-${call.peer}`;
                remoteVid.autoplay = true;
                remoteVid.playsInline = true;
                document.getElementById('remote-videos-container').appendChild(remoteVid);
            }
            
            remoteVid.srcObject = remoteStream;
            remoteVid.onloadedmetadata = () => {
                remoteVid.play().catch(err => console.warn("Autoplay blocked:", err));
            };
        });

        call.on('close', () => {
            const vid = document.getElementById(`vid-${call.peer}`);
            if(vid) vid.remove();

            if (!isEndingCallLocal) {
                const peerName = members[call.peer]?.name || "Someone";
                if (!callAnswered) {
                    renderSystemMessage(`📞 ${peerName} declined the video call.`);
                } else {
                    renderSystemMessage(`📞 ${peerName} disconnected from the call.`);
                }
            }

            // Cleanup if everyone leaves the call
            const container = document.getElementById('remote-videos-container');
            if (container.children.length <= 1 && localStream) {
                document.getElementById('video-ui').style.display = 'none';
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
                activeCalls = [];
            }
        });

        call.on('error', err => {
            console.error("Call error:", err);
        });
    }

    function toggleMute() {
        if(localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            const btn = document.getElementById('mute-btn');
            btn.innerText = audioTrack.enabled ? '🎙️ Mute' : '🔇 Unmute';
            btn.style.background = audioTrack.enabled ? '#333' : '#e74c3c';
        }
    }

    function endCall() {
        isEndingCallLocal = true;
        renderSystemMessage(`📞 You ended the call.`);

        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        activeCalls.forEach(call => call.close());
        activeCalls = [];
        document.getElementById('video-ui').style.display = 'none';
        
        const container = document.getElementById('remote-videos-container');
        Array.from(container.children).forEach(child => {
            if(child.id !== 'local-video') child.remove();
        });

        setTimeout(() => { isEndingCallLocal = false; }, 1000); 
    }
</script>
</body>
</html>
