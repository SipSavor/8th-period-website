<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Group Chat + Member List</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --side-bar: #1e1e1e;
            --chat-bg: #181818;
            --text-main: #e0e0e0;
            --accent: #0084ff;
            --received-bg: #333;
            --success: #2ecc71;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { 
            width: 280px; background: var(--side-bar); padding: 20px; 
            display: flex; flex-direction: column; border-right: 1px solid #333; z-index: 10;
        }
        .sidebar h2 { font-size: 1.1rem; margin: 0 0 20px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .my-id-box { background: #2a2a2a; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 0.75rem; margin-bottom: 20px; cursor: pointer; border: 1px dashed #555; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; }
        .my-id-box:hover { background: #333; border-color: var(--accent); }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
        input { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; outline: none; font-size: 0.9rem; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover:not(:disabled) { filter: brightness(1.1); }
        button:disabled { background: #444; opacity: 0.6; cursor: not-allowed; }

        /* Member List */
        .member-section { flex-grow: 1; overflow-y: auto; }
        .member-section h3 { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 10px; }
        .member-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; margin-bottom: 8px; color: #bbb; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 5px var(--success); }
        .host-badge { font-size: 0.6rem; background: var(--accent); color: white; padding: 2px 5px; border-radius: 4px; margin-left: auto; }

        /* Main Chat */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); position: relative;}
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* Bubbles */
        .msg-container { display: flex; flex-direction: column; max-width: 70%; animation: fadeIn 0.2s ease; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        
        .msg-header { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
        .msg-container.sent .msg-header { flex-direction: row-reverse; }
        
        .user-label { font-size: 0.75rem; font-weight: 700; color: var(--accent); }
        .msg-container.sent .user-label { color: #cce6ff; }
        .timestamp { font-size: 0.65rem; color: #888; }

        .msg-bubble { padding: 10px 14px; border-radius: 15px; font-size: 0.92rem; word-break: break-word; }
        .msg-container.sent .msg-bubble { background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg-container.received .msg-bubble { background: var(--received-bg); border-bottom-left-radius: 2px; }
        .system { align-self: center; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 12px; color: #aaa; font-size: 0.75rem; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Bottom Area */
        .bottom-container { background: var(--side-bar); border-top: 1px solid #333; display: flex; flex-direction: column;}
        #typing-indicator { font-size: 0.75rem; color: #aaa; padding: 5px 20px 0 20px; font-style: italic; min-height: 15px;}
        .message-input-area { padding: 15px 20px 20px 20px; display: flex; gap: 10px; }
        #msg-input { flex-grow: 1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>P2P Group</h2>
        <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">YOUR ID (Click to copy)</div>
        <div class="my-id-box" id="my-id" title="Click to copy!">Initializing...</div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Your Name" onchange="updateProfile()">
            <input type="text" id="join-id" placeholder="Friend's Host ID">
            <button id="action-btn">Join Chat</button>
        </div>
        
        <div class="member-section">
            <h3>Members Online</h3>
            <div id="member-list"></div>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-box"></div>
        <div class="bottom-container">
            <div id="typing-indicator"></div>
            <div class="message-input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- State & Initialization ---
    const peer = new Peer();
    let connections = [];
    let members = {}; // Stores all network IDs -> Profiles
    let isHost = true;
    let currentHostId = null;
    let typingTimeout;
    
    // LocalStorage Setup
    const STORAGE_KEY = 'p2p_chat_history';
    let chatHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // UI Elements
    const myIdDisplay = document.getElementById('my-id');
    const chatBox = document.getElementById('chat-box');
    const memberListUI = document.getElementById('member-list');
    const usernameInput = document.getElementById('username');
    const typingIndicator = document.getElementById('typing-indicator');

    // Load saved username if exists
    if(localStorage.getItem('p2p_username')) usernameInput.value = localStorage.getItem('p2p_username');

    // Load History on Boot
    chatHistory.forEach(msg => renderMessage(msg.profile, msg.text, msg.type, msg.time));
    renderMessage(null, "Ready to connect. History loaded.", "system");

    // --- Audio System (No external files needed) ---
    function playTone(type) {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'send') {
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.1);
            } else {
                osc.frequency.setValueAtTime(500, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.1);
            }
            
            osc.start();
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
            osc.stop(ctx.currentTime + 0.1);
        } catch(e) { console.warn("Audio not supported or disabled"); }
    }

    // --- PeerJS Logic ---
    peer.on('open', id => {
        myIdDisplay.innerText = id;
        members[id] = getMyProfile();
        updateMemberList();
    });

    myIdDisplay.onclick = () => {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        myIdDisplay.innerText = "Copied!";
        setTimeout(() => myIdDisplay.innerText = peer.id, 1000);
    };

    function updateProfile() {
        localStorage.setItem('p2p_username', usernameInput.value);
        members[peer.id] = getMyProfile();
        if(isHost) broadcastMembers();
    }

    function getMyProfile() {
        return { name: usernameInput.value.trim() || "Guest_" + (peer.id ? peer.id.substring(0,4) : "") };
    }

    // When someone connects to us (we act as Host)
    peer.on('connection', conn => {
        isHost = true;
        currentHostId = peer.id;
        setupConnection(conn);
    });

    // When we want to join someone else
    document.getElementById('action-btn').onclick = () => {
        const targetId = document.getElementById('join-id').value.trim();
        if (!targetId || targetId === peer.id) return;
        
        isHost = false;
        currentHostId = targetId;
        setupConnection(peer.connect(targetId));
        document.getElementById('action-btn').disabled = true;
        document.getElementById('action-btn').innerText = "Connected";
    };

    function setupConnection(conn) {
        conn.on('open', () => {
            connections.push(conn);
            conn.send({ type: 'HELO', profile: getMyProfile() });

            conn.on('data', data => {
                if (data.type === 'HELO') {
                    members[conn.peer] = data.profile;
                    renderMessage(null, `${data.profile.name} joined the chat.`, "system");
                    if (isHost) broadcastMembers();
                } 
                else if (data.type === 'CHAT') {
                    handleIncomingMessage(data.profile, data.text, data.time);
                    if (isHost) relayData(conn, data); // Host forwards to others
                }
                else if (data.type === 'MEMBER_LIST') {
                    members = data.list;
                    currentHostId = data.hostId;
                    updateMemberList();
                }
                else if (data.type === 'TYPING') {
                    showTypingIndicator(data.profile.name);
                    if (isHost) relayData(conn, data);
                }
            });
        });

        conn.on('close', () => handleDisconnection(conn));
        conn.on('error', () => handleDisconnection(conn));
    }

    function handleDisconnection(conn) {
        const droppedName = members[conn.peer]?.name || "Someone";
        delete members[conn.peer];
        connections = connections.filter(c => c.peer !== conn.peer);
        updateMemberList();

        // HOST MIGRATION LOGIC
        if (!isHost && conn.peer === currentHostId) {
            renderMessage(null, "Host disconnected. Negotiating new host...", "system");
            
            // Sort remaining peers alphabetically to elect a new deterministic host
            const remainingIds = Object.keys(members).sort();
            
            if (remainingIds.length > 0) {
                const nextHostId = remainingIds[0];
                
                if (nextHostId === peer.id) {
                    // I am the new host!
                    isHost = true;
                    currentHostId = peer.id;
                    renderMessage(null, "You are the new host.", "system");
                    broadcastMembers(); // Tell everyone I'm in charge now
                } else {
                    // Someone else is the new host, connect to them
                    currentHostId = nextHostId;
                    renderMessage(null, `Reconnecting to new host: ${members[nextHostId].name}...`, "system");
                    setTimeout(() => setupConnection(peer.connect(nextHostId)), 1500); // Slight delay for host to initialize
                }
            } else {
                renderMessage(null, "All users disconnected. You are alone.", "system");
                document.getElementById('action-btn').disabled = false;
                document.getElementById('action-btn').innerText = "Join Chat";
            }
        } else if (isHost) {
            renderMessage(null, `${droppedName} left the chat.`, "system");
            broadcastMembers();
        }
    }

    function broadcastMembers() {
        members[peer.id] = getMyProfile(); // ensure self is in list
        connections.forEach(c => {
            if(c.open) c.send({ type: 'MEMBER_LIST', list: members, hostId: peer.id });
        });
        updateMemberList();
    }

    function relayData(senderConn, data) {
        connections.forEach(c => {
            if (c.peer !== senderConn.peer && c.open) c.send(data);
        });
    }

    function updateMemberList() {
        memberListUI.innerHTML = '';
        Object.keys(members).forEach(id => {
            const profile = members[id];
            const el = document.createElement('div');
            el.className = 'member-item';
            
            let badge = id === currentHostId ? '<span class="host-badge">HOST</span>' : '';
            if (!currentHostId && isHost && id === peer.id) badge = '<span class="host-badge">HOST</span>'; // Fallback display
            
            el.innerHTML = `
                <div class="status-dot"></div> 
                <span>${profile.name} ${id === peer.id ? '(You)' : ''}</span>
                ${badge}
            `;
            memberListUI.appendChild(el);
        });
    }

    // --- Messaging, Typing, & UI ---
    
    // Typing Events
    document.getElementById('msg-input').addEventListener('input', () => {
        const data = { type: 'TYPING', profile: getMyProfile() };
        if (isHost) relayData({peer: peer.id}, data); // Relay to others (mocking sender as self)
        else connections.forEach(c => c.open && c.send(data));
    });

    function showTypingIndicator(name) {
        if (name === getMyProfile().name) return; // Don't show for self
        typingIndicator.innerText = `${name} is typing...`;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => { typingIndicator.innerText = ''; }, 2000);
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (!text) return;

        const profile = getMyProfile();
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const data = { type: 'CHAT', profile, text, time };
        
        // Send to peers
        connections.forEach(c => c.open && c.send(data));
        
        // Render locally & Save
        renderMessage(profile, text, "sent", time);
        saveToHistory(profile, text, "sent", time);
        playTone('send');
        
        input.value = "";
        
        // clear typing indicator immediately locally
        clearTimeout(typingTimeout); 
        typingIndicator.innerText = '';
    }

    function handleIncomingMessage(profile, text, time) {
        renderMessage(profile, text, "received", time);
        saveToHistory(profile, text, "received", time);
        playTone('receive');
        
        // Clear typing indicator since they sent the message
        clearTimeout(typingTimeout);
        typingIndicator.innerText = '';
    }

    function saveToHistory(profile, text, type, time) {
        chatHistory.push({ profile, text, type, time });
        if (chatHistory.length > 100) chatHistory.shift(); // Keep last 100 messages max
        localStorage.setItem(STORAGE_KEY, JSON.stringify(chatHistory));
    }

    function renderMessage(profile, text, type, time = '') {
        const wrapper = document.createElement('div');
        
        if (type === 'system') {
            wrapper.className = `system`;
            wrapper.innerText = text;
        } else {
            wrapper.className = `msg-container ${type}`;
            wrapper.innerHTML = `
                <div class="msg-header">
                    <span class="user-label">${profile.name}</span>
                    <span class="timestamp">${time}</span>
                </div>
                <div class="msg-bubble">${text}</div>
            `;
        }
        
        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Event Listeners
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
