<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure Comms | Kingdom of 8th Period">
    <title>Secure Chat | Kingdom of 8th Period</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8; --primary-hover: #6366f1;
            --bg-main: #020617; --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --danger: #ef4444; --danger-hover: #b91c1c;
            --msg-sent: #818cf8; --msg-received: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(52, 211, 153, 0.05) 0%, transparent 40%);
            background-attachment: fixed; color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
        }

        /* --- NAVIGATION --- */
        nav {
            position: sticky; top: 0; z-index: 1000; background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(20px); padding: 1.25rem 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--card-border);
        }
        .nav-logo { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-main); }

        /* --- CHAT CONTAINER --- */
        .chat-wrapper {
            max-width: 900px; width: 100%; margin: 40px auto; flex: 1;
            display: flex; flex-direction: column; padding: 0 20px;
            animation: slideUp 0.6s ease-out;
        }

        .chat-header {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px 20px 0 0; padding: 20px; backdrop-filter: blur(12px);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: none;
        }

        .channel-selector {
            background: rgba(0,0,0,0.5); border: 1px solid var(--card-border);
            color: white; padding: 10px 16px; border-radius: 12px; font-family: inherit;
            font-size: 1rem; font-weight: 600; outline: none; cursor: pointer;
            width: 100%; max-width: 300px;
        }
        .channel-selector option { background: var(--bg-main); color: white; }

        .chat-box {
            background: rgba(15, 23, 42, 0.6); border: 1px solid var(--card-border);
            height: 500px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            backdrop-filter: blur(12px);
        }

        /* --- MESSAGE BUBBLES --- */
        .msg-row { display: flex; width: 100%; }
        .msg-row.sent { justify-content: flex-end; }
        .msg-row.received { justify-content: flex-start; }

        .msg-bubble {
            max-width: 70%; padding: 12px 16px; border-radius: 16px; position: relative;
            font-size: 0.95rem; line-height: 1.5; word-wrap: break-word;
        }
        .msg-row.sent .msg-bubble { background: var(--msg-sent); color: #000; border-bottom-right-radius: 4px; }
        .msg-row.received .msg-bubble { background: var(--msg-received); color: #fff; border-bottom-left-radius: 4px; }

        .msg-info { font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; display: flex; justify-content: space-between; gap: 10px;}
        .msg-row.sent .msg-info { color: rgba(0,0,0,0.6); }
        .msg-row.received .msg-info { color: var(--text-muted); }

        .delete-btn {
            background: var(--danger); color: white; border: none; border-radius: 6px;
            cursor: pointer; padding: 2px 6px; font-size: 0.75rem; margin-left: 10px;
            transition: 0.2s; display: none; /* Hidden by default */
        }
        .delete-btn:hover { background: var(--danger-hover); }

        /* --- INPUT AREA --- */
        .chat-input-area {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 0 0 20px 20px; padding: 20px; backdrop-filter: blur(12px);
            display: flex; gap: 10px; border-top: none;
        }

        .chat-input-area input {
            flex: 1; padding: 14px 20px; border-radius: 12px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.5); color: white; font-family: inherit; font-size: 1rem;
            outline: none; transition: 0.2s;
        }
        .chat-input-area input:focus { border-color: var(--primary); }
        
        .chat-input-area button {
            padding: 0 24px; border-radius: 12px; border: none; background: var(--primary);
            color: #020617; font-weight: 700; font-family: inherit; font-size: 1rem;
            cursor: pointer; transition: 0.2s;
        }
        .chat-input-area button:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .chat-input-area button:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

        /* --- LOGIN PROMPT --- */
        #login-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-radius: 20px; z-index: 10; text-align: center; padding: 20px;
        }

        footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; border-top: 1px solid var(--card-border); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { nav { flex-direction: column; gap: 1.5rem; } .nav-links { flex-wrap: wrap; justify-content: center; } .msg-bubble{ max-width: 85%; } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom of 8th</div>
        <div class="nav-links">
            <a href="index.html">Portal</a>
            <a href="news.html">News</a>
            <a href="constitution.html">Constitution</a>
            <a href="ranks.html">Ranks</a>
            <a href="chat.html" style="color: var(--primary);">Secure Chat 🔒</a>
            <a href="economy.html">Economy</a>
            <a href="links.html">Links</a>
            <a href="#" id="auth-status-btn" onclick="handleAuthClick()">Log In</a>
        </div>
    </nav>

    <main class="chat-wrapper">
        <div style="position: relative;">
            
            <div id="login-overlay">
                <h2 style="margin-bottom: 10px;">Comms Restricted</h2>
                <p style="color: var(--text-muted); margin-bottom: 20px;">You must be logged into the Kingdom Portal to access communications.</p>
            </div>

            <div class="chat-header">
                <div>
                    <h2 style="font-size: 1.25rem;">Town Square</h2>
                    <p style="font-size: 0.85rem; color: var(--text-muted);" id="channel-desc">Public communications channel.</p>
                </div>
                <select class="channel-selector" id="channel-select" onchange="switchChannel()">
                    <option value="global">🌍 Global Chat</option>
                    </select>
            </div>

            <div class="chat-box" id="messages-container">
                </div>

            <div class="chat-input-area">
                <input type="text" id="message-input" placeholder="Transmit a message..." onkeypress="handleEnter(event)">
                <button id="send-btn" onclick="sendMessage()">Send</button>
            </div>

        </div>
    </main>
    
    <footer>
        &copy; <span id="current-year"></span> KINGDOM OF 8TH PERIOD • ASCENDANCY THROUGH ORDER
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        // NEW: Imported deleteDoc to allow Admins to remove messages
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot, getDocs, getDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIsdB35U2clkR3b8bYdWNxRI14A9aGj-k",
            authDomain: "chatting-kingdom.firebaseapp.com",
            databaseURL: "https://chatting-kingdom-default-rtdb.firebaseio.com",
            projectId: "chatting-kingdom",
            storageBucket: "chatting-kingdom.firebasestorage.app",
            messagingSenderId: "159434733757",
            appId: "1:159434733757:web:e86256ba72525c0830dfd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserData = null;
        let isAdmin = false;
        let currentChannel = "global";
        let unsubscribeChat = null; // Holds the active chat listener

        document.getElementById('current-year').textContent = new Date().getFullYear();

        // --- AUTHENTICATION & SETUP ---
        onAuthStateChanged(auth, async (user) => {
            const authBtn = document.getElementById('auth-status-btn');
            const overlay = document.getElementById('login-overlay');

            if (user) {
                currentUser = user;
                authBtn.textContent = "Disconnect";
                overlay.style.display = "none";

                // Fetch user data for Rank & Name
                const userSnap = await getDoc(doc(db, "users", user.uid));
                if (userSnap.exists()) {
                    currentUserData = userSnap.data();
                    if (currentUserData.role === "web team" || currentUserData.role === "chancellor") {
                        isAdmin = true;
                    }
                }
                
                populateUserDropdown();
                startChatListener();
            } else {
                currentUser = null;
                isAdmin = false;
                authBtn.textContent = "Log In";
                overlay.style.display = "flex";
            }
        });

        window.handleAuthClick = () => {
            if (currentUser) { signOut(auth).then(() => window.location.reload()); } 
            else { window.location.href = "index.html"; }
        };

        // --- DIRECT MESSAGING LOGIC ---
        async function populateUserDropdown() {
            const select = document.getElementById('channel-select');
            const usersSnap = await getDocs(collection(db, "users"));
            
            usersSnap.forEach((doc) => {
                if (doc.id !== currentUser.uid) { // Don't list yourself
                    const opt = document.createElement('option');
                    opt.value = doc.id; // We store the UID as the value
                    opt.textContent = `🔒 DM: ${doc.data().name}`;
                    select.appendChild(opt);
                }
            });
        }

        window.switchChannel = () => {
            const select = document.getElementById('channel-select');
            const desc = document.getElementById('channel-desc');
            
            if (select.value === "global") {
                currentChannel = "global";
                desc.textContent = "Public communications channel.";
            } else {
                // To create a unique, consistent room ID between two people, 
                // we sort their UIDs alphabetically and combine them.
                const otherUid = select.value;
                const myUid = currentUser.uid;
                currentChannel = myUid < otherUid ? `${myUid}_${otherUid}` : `${otherUid}_${myUid}`;
                
                const otherName = select.options[select.selectedIndex].text.replace("🔒 DM: ", "");
                desc.textContent = `Encrypted private channel with ${otherName}.`;
            }
            
            startChatListener(); // Restart the listener for the new channel
        };

        // --- CHAT LISTENER & MODERATION ---
        function startChatListener() {
            if (unsubscribeChat) unsubscribeChat(); // Stop listening to old channel
            const messagesContainer = document.getElementById('messages-container');
            messagesContainer.innerHTML = ""; // Clear old messages

            // Simple query sorted by time. We filter by channel locally to avoid complex Firebase Indexing rules.
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeChat = onSnapshot(q, (snapshot) => {
                messagesContainer.innerHTML = ""; // Clear UI before redrawing
                
                snapshot.forEach((docSnap) => {
                    const msg = docSnap.data();
                    
                    // Only render if the message belongs to the current room
                    if (msg.channel === currentChannel) {
                        const isMe = msg.senderId === currentUser.uid;
                        
                        const row = document.createElement('div');
                        row.className = `msg-row ${isMe ? 'sent' : 'received'}`;
                        
                        // Add Delete button if Admin (and not rendering their own message to save space, though you could!)
                        const deleteBtnHTML = isAdmin ? `<button class="delete-btn" style="display:inline-block;" onclick="deleteMessage('${docSnap.id}')">🗑️</button>` : '';

                        row.innerHTML = `
                            <div class="msg-bubble">
                                <div class="msg-info">
                                    <strong>${msg.senderName}</strong>
                                    ${deleteBtnHTML}
                                </div>
                                <div>${msg.text}</div>
                            </div>
                        `;
                        messagesContainer.appendChild(row);
                    }
                });
                
                // Auto-scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        // --- SENDING & DELETING MESSAGES ---
        window.handleEnter = (e) => { if(e.key === 'Enter') sendMessage(); };

        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            const btn = document.getElementById('send-btn');
            
            if (!text || !currentUser) return;
            
            btn.disabled = true;
            input.value = ""; // Clear input immediately for UX

            try {
                await addDoc(collection(db, "messages"), {
                    text: text,
                    senderId: currentUser.uid,
                    senderName: currentUserData.name || "Citizen",
                    channel: currentChannel, // "global" or the DM combined ID
                    timestamp: serverTimestamp()
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Failed to send message.");
            }
            btn.disabled = false;
            input.focus();
        };

        window.deleteMessage = async (messageId) => {
            if (!isAdmin) return;
            if (confirm("Are you sure you want to delete this message by royal decree?")) {
                try {
                    await deleteDoc(doc(db, "messages", messageId));
                } catch (error) {
                    console.error("Error deleting message: ", error);
                    alert("Failed to delete message. Check your permissions.");
                }
            }
        };

    </script>
</body>
</html>
