<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Citizen Portal Chat for the Kingdom of 8th Period">
    <title>Kingdom of 8th Period | Secure Comms</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- MODERN DESIGN SYSTEM --- */
        :root {
            --primary: #818cf8;
            --primary-hover: #6366f1;
            --accent: #f59e0b;
            --bg-main: #0f172a;
            --surface-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --msg-received: #334155;
            --msg-sent: linear-gradient(135deg, #818cf8, #6366f1);
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100dvh; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-bg); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* --- NAVIGATION --- */
        nav {
            padding: 1.25rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-logo::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }

        /* --- APP LAYOUT --- */
        .app-container { 
            display: flex; 
            flex-grow: 1; 
            width: 100vw; 
            position: relative; 
            overflow: hidden;
        }

        .sidebar { 
            width: 320px; 
            background: var(--surface-bg);
            padding: 2rem; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid var(--card-border); 
            z-index: 20; 
            transition: transform 0.3s ease; 
        }

        .sidebar h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .my-id-box { 
            background: rgba(0,0,0,0.2); 
            padding: 1rem; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 0.85rem; 
            margin-bottom: 1.5rem; 
            cursor: pointer; 
            border: 1px dashed var(--card-border); 
            text-align: center;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .my-id-box:hover {
            border-color: var(--primary);
            color: var(--text-main);
            background: rgba(129, 140, 248, 0.05);
        }
        
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        
        input { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid var(--card-border); 
            color: var(--text-main); 
            padding: 12px 16px; 
            border-radius: 12px; 
            outline: none; 
            font-size: 0.95rem; 
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.1);
        }
        
        button.action-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        button.action-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .encryption-box {
            border-left: 3px solid var(--success);
            padding-left: 12px;
            margin-top: 10px;
            background: rgba(16, 185, 129, 0.05);
            padding: 10px;
            border-radius: 0 8px 8px 0;
        }

        .member-section h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }
        
        #member-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9rem;
        }

        .main-chat {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- CHAT AREA --- */
        #chat-box { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 2rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem; 
            scroll-behavior: smooth;
        }

        .msg-row { 
            display: flex; 
            gap: 12px; 
            max-width: 75%; 
            animation: slideUpMsg 0.3s ease; 
        }
        .msg-row.sent { 
            align-self: flex-end; 
            flex-direction: row-reverse; 
        }
        
        .msg-bubble { 
            padding: 1rem 1.25rem; 
            border-radius: 18px; 
            font-size: 0.95rem; 
            word-break: break-word; 
            line-height: 1.5; 
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .msg-row.sent .msg-bubble { 
            background: var(--msg-sent); 
            color: #ffffff; 
            border-bottom-right-radius: 4px; 
        }
        .msg-row.received .msg-bubble { 
            background: var(--msg-received); 
            border: 1px solid var(--card-border); 
            border-bottom-left-radius: 4px; 
        }

        .msg-bubble strong {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .system-msg {
            align-self: center;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            margin: 0.5rem 0;
        }

        .bottom-container { 
            background: var(--bg-main); 
            border-top: 1px solid var(--card-border); 
            padding: 1.5rem 2rem;
        }

        .message-input-area { display: flex; gap: 1rem; align-items: center; }
        #msg-input { flex-grow: 1; border-radius: 25px; padding: 1rem 1.5rem; }
        #send-btn { border-radius: 25px; padding: 1rem 1.5rem; }

        /* --- VIDEO CALL UI --- */
        #video-ui { 
            display: none; 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            width: 280px; 
            background: var(--surface-bg); 
            border-radius: 16px; 
            z-index: 50; 
            flex-direction: column; 
            overflow: hidden; 
            border: 1px solid var(--card-border); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        #local-video { 
            position: absolute; 
            bottom: 12px; 
            right: 12px; 
            width: 80px; 
            height: 106px; 
            border-radius: 8px; 
            border: 2px solid var(--primary); 
            z-index: 2;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .bottom-container { padding: 1rem; }
            #chat-box { padding: 1rem; }
        }

        @keyframes slideUpMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom of 8th</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="chat.html" class="active">Comms</a>
        </div>
    </nav>

    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <h2>Secure Comms</h2>
            <div class="my-id-box" id="my-id" onclick="copyId()" title="Click to copy">Initializing Network...</div>

            <div class="input-group">
                <input type="text" id="username" placeholder="Citizen Name" onchange="updateProfile()">
                <input type="text" id="join-id" placeholder="Connect ID">
                <button id="action-btn" class="action-btn">Establish Link</button>
                
                <div class="encryption-box">
                    <div style="font-size: 0.75rem; color: var(--success); margin-bottom: 6px; font-weight: 600;">🔒 E2E KEY</div>
                    <input type="password" id="room-pass" placeholder="Secret Key" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3);">
                </div>
            </div>
            
            <div class="member-section" style="margin-top: auto;">
                <h3>Active Citizens</h3>
                <div id="member-list"></div>
            </div>
        </div>

        <div class="main-chat">
            <div id="video-ui">
                <div style="position: relative; aspect-ratio: 3/4;" id="remote-videos-container">
                    <video id="local-video" autoplay muted playsinline></video>
                </div>
                <div style="display: flex; padding: 12px; gap: 8px; background: rgba(0,0,0,0.2);">
                    <button onclick="toggleMute()" id="mute-btn" class="action-btn" style="flex:1; padding: 8px; background: var(--surface-bg); border: 1px solid var(--card-border);">🎙️</button>
                    <button onclick="endCall()" class="action-btn" style="flex:1; background: var(--danger); padding: 8px;">End</button>
                </div>
            </div>

            <div id="chat-box"></div>
            
            <div class="bottom-container">
                <div class="message-input-area">
                    <button id="menu-toggle" class="action-btn" style="padding: 10px 14px; border-radius: 12px;">☰</button>
                    <input type="text" id="msg-input" placeholder="Transmit secure message..." autocomplete="off">
                    <button onclick="startVideoCall()" class="action-btn" style="padding: 10px 14px; border-radius: 12px; background: var(--surface-bg); border: 1px solid var(--card-border);">📹</button>
                    <button id="send-btn" class="action-btn">Send</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const peer = new Peer({
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]
        }
    });

    let connections = [];
    let members = {};
    let isHost = true;
    let localStream = null;
    let activeCalls = [];

    // --- Encryption Logic ---
    async function getCryptoKey() {
        const pass = document.getElementById('room-pass').value;
        if (!pass) return null;
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), {name: "PBKDF2"}, false, ["deriveKey"]);
        return await crypto.subtle.deriveKey({name: "PBKDF2", salt: enc.encode("p2p_salt"), iterations: 100000, hash: "SHA-256"}, keyMaterial, {name: "AES-GCM", length: 256}, false, ["encrypt", "decrypt"]);
    }

    async function securePackage(dataObj) {
        const key = await getCryptoKey();
        if(!key) return { __raw: dataObj }; 
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt({name: "AES-GCM", iv}, key, new TextEncoder().encode(JSON.stringify(dataObj)));
        return { __encrypted: true, iv: Array.from(iv), data: Array.from(new Uint8Array(encrypted)) };
    }

    async function secureUnpackage(payload) {
        if(payload.__raw) return payload.__raw;
        const key = await getCryptoKey();
        if(!key) return { type: 'SYSTEM', text: '🔒 Locked: Enter Secret Key to decrypt.' };
        try {
            const decrypted = await crypto.subtle.decrypt({name: "AES-GCM", iv: new Uint8Array(payload.iv)}, key, new Uint8Array(payload.data));
            return JSON.parse(new TextDecoder().decode(decrypted));
        } catch(e) { return { type: 'SYSTEM', text: '🔒 Decryption Error: Invalid Key.' }; }
    }

    // --- Peer Connections ---
    peer.on('open', id => { document.getElementById('my-id').innerText = id; members[id] = getProfile(); });
    
    peer.on('connection', conn => { isHost = true; setupConnection(conn); });

    document.getElementById('action-btn').onclick = () => {
        const tid = document.getElementById('join-id').value.trim();
        if (tid) { isHost = false; setupConnection(peer.connect(tid)); }
    };

    function setupConnection(conn) {
        conn.on('open', () => {
            connections.push(conn);
            conn.send({ __raw: { type: 'HELO', profile: getProfile() }});
            
            conn.on('data', async payload => {
                // Host Relay: Re-broadcast to all other connected peers
                if (isHost) connections.forEach(c => { if(c.peer !== conn.peer) c.send(payload); });

                const data = await secureUnpackage(payload);
                if (data.type === 'HELO') {
                    members[conn.peer] = data.profile;
                    renderSystem(`${data.profile.name} established link.`);
                    if(isHost) broadcastMembers();
                } else if (data.type === 'CHAT') {
                    renderMsg(data);
                } else if (data.type === 'LIST') {
                    members = data.list;
                    updateList();
                } else if (data.type === 'SYSTEM') {
                    renderSystem(data.text);
                }
            });
        });
        conn.on('close', () => { 
            connections = connections.filter(c => c.peer !== conn.peer);
            renderSystem(`A citizen disconnected.`);
        });
    }

    function broadcastMembers() {
        const payload = { __raw: { type: 'LIST', list: members }};
        connections.forEach(c => c.send(payload));
        updateList();
    }

    // --- Messaging ---
    async function send() {
        if(!document.getElementById('room-pass').value) {
            alert("Secret Key Required for E2E Encryption!");
            document.getElementById('room-pass').focus();
            return;
        }
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        
        const msg = { type: 'CHAT', senderId: peer.id, profile: getProfile(), text: input.value, time: new Date().toLocaleTimeString() };
        const packed = await securePackage(msg);
        connections.forEach(c => c.send(packed));
        renderMsg(msg);
        input.value = '';
    }

    // Mobile Scroll Fix
    document.getElementById('msg-input').onfocus = () => setTimeout(() => {
        const cb = document.getElementById('chat-box');
        cb.scrollTop = cb.scrollHeight;
    }, 300);

    // --- Video ---
    window.startVideoCall = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            const lv = document.getElementById('local-video');
            lv.srcObject = localStream;
            lv.muted = true; 
            document.getElementById('video-ui').style.display = 'flex';
            connections.forEach(c => setupCall(peer.call(c.peer, localStream)));
        } catch(e) { alert("Camera access denied or failed."); }
    };

    peer.on('call', call => {
        if(confirm("Incoming video link. Accept?")) {
            navigator.mediaDevices.getUserMedia({video: true, audio: true}).then(s => {
                localStream = s;
                const lv = document.getElementById('local-video');
                lv.srcObject = s;
                lv.muted = true;
                document.getElementById('video-ui').style.display = 'flex';
                call.answer(s);
                setupCall(call);
            }).catch(e => alert("Camera access required to answer."));
        }
    });

    function setupCall(call) {
        activeCalls.push(call);
        call.on('stream', rs => {
            if(document.getElementById('rv-'+call.peer)) return;
            const rv = document.createElement('video');
            rv.id = 'rv-'+call.peer;
            rv.srcObject = rs;
            rv.autoplay = true;
            rv.playsInline = true;
            document.getElementById('remote-videos-container').appendChild(rv);
        });
    }

    // --- Helpers ---
    function getProfile() { 
        return { name: document.getElementById('username').value || "Unknown Citizen" }; 
    }
    
    function updateProfile() {
        if(peer.id) members[peer.id] = getProfile();
        if(isHost) broadcastMembers();
    }

    function renderMsg(d) {
        const r = document.createElement('div');
        r.className = 'msg-row ' + (d.senderId === peer.id ? 'sent' : 'received');
        // If the message couldn't be decrypted, style it differently
        if(d.type === 'SYSTEM') {
           r.innerHTML = `<div class="msg-bubble" style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger);"><strong>System</strong><br>${d.text}</div>`;
        } else {
           r.innerHTML = `<div class="msg-bubble"><strong>${d.profile.name}</strong>${d.text}</div>`;
        }
        
        document.getElementById('chat-box').appendChild(r);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function renderSystem(t) {
        const s = document.createElement('div');
        s.className = 'system-msg';
        s.innerText = t;
        document.getElementById('chat-box').appendChild(s);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function updateList() {
        const ml = document.getElementById('member-list'); 
        ml.innerHTML = '';
        Object.values(members).forEach(m => {
            const i = document.createElement('div'); 
            i.style.display = 'flex';
            i.style.alignItems = 'center';
            i.style.gap = '8px';
            i.innerHTML = `<span style="color: var(--success);">●</span> ${m.name}`; 
            ml.appendChild(i);
        });
    }

    function copyId() {
        const idText = document.getElementById('my-id').innerText;
        if(idText && idText !== "Initializing Network...") {
            navigator.clipboard.writeText(idText);
            renderSystem("Network ID copied to clipboard.");
        }
    }

    // Event Listeners
    document.getElementById('send-btn').onclick = send;
    document.getElementById('msg-input').onkeypress = e => { if(e.key === 'Enter') send(); };
    document.getElementById('menu-toggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

    window.toggleMute = () => {
        if(localStream) {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            document.getElementById('mute-btn').innerText = t.enabled ? '🎙️' : '🔇';
        }
    };

    window.endCall = () => {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        activeCalls.forEach(c => c.close());
        activeCalls = [];
        document.getElementById('remote-videos-container').innerHTML = '<video id="local-video" autoplay muted playsinline></video>';
        document.getElementById('video-ui').style.display = 'none';
        renderSystem("Video link terminated.");
    };
</script>
</body>
</html>
