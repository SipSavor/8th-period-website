<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kingdom of 8th | Secure Comms</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #818cf8;
            --bg-main: #020617; 
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main); color: var(--text-main); 
            height: 100dvh; display: flex; flex-direction: column; overflow: hidden; 
        }

        nav { padding: 1rem 5%; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(10px); }
        .nav-logo { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); text-decoration: none; }

        .app-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        .sidebar { 
            width: 300px; border-right: 1px solid var(--card-border); padding: 20px; 
            display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.3);
        }

        #chat-box { flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; background: rgba(0,0,0,0.2); }

        /* Bubbles */
        .msg { padding: 12px 16px; border-radius: 18px; max-width: 80%; position: relative; animation: fadeIn 0.3s ease; }
        .sent { background: var(--primary); align-self: flex-end; color: #000; border-bottom-right-radius: 4px; }
        .received { background: var(--card-bg); border: 1px solid var(--card-border); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-user { font-size: 10px; font-weight: 800; margin-bottom: 4px; display: block; opacity: 0.8; }

        .input-area { padding: 20px; border-top: 1px solid var(--card-border); display: flex; gap: 10px; background: var(--bg-main); }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: white; padding: 14px; border-radius: 12px; flex-grow: 1; outline: none; }
        button { background: var(--primary); border: none; padding: 12px 24px; border-radius: 12px; cursor: pointer; font-weight: 800; color: #000; }

        .id-badge { font-family: monospace; font-size: 10px; color: var(--primary); background: rgba(129, 140, 248, 0.1); padding: 8px; border-radius: 6px; cursor: pointer; margin-top: auto; text-align: center; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">Kingdom of 8th</a>
        <div id="status" style="font-size: 12px; color: var(--text-muted);">Syncing Identity...</div>
    </nav>

    <div class="app-container">
        <div class="sidebar">
            <h3 id="citizen-name" style="margin-bottom: 20px;">Loading Profile...</h3>
            
            <label style="font-size: 11px; color: var(--text-muted); font-weight: 600;">LINK TO CITIZEN</label>
            <input type="text" id="target-id" placeholder="Paste ID here" style="margin-top: 8px; font-size: 12px;">
            <button onclick="connectToPeer()" style="margin-top: 10px; width: 100%; font-size: 13px;">Establish Link</button>
            
            <div class="id-badge" id="my-peer-id" onclick="copyId()">ID: Generating...</div>
        </div>

        <div style="flex-grow: 1; display: flex; flex-direction: column;">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Secure transmission..." autocomplete="off">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG (MATCHES YOURS) ---
    const firebaseConfig = {
        apiKey: "AIzaSyC9AQ8I79SzcOxhyT4-Z9qYVSr4Cv3njK0",
        authDomain: "kingdom-of-8th-79341.firebaseapp.com",
        databaseURL: "https://kingdom-of-8th-79341-default-rtdb.firebaseio.com",
        projectId: "kingdom-of-8th-79341",
        storageBucket: "kingdom-of-8th-79341.firebasestorage.app",
        messagingSenderId: "399956360550",
        appId: "1:399956360550:web:b498c38f52d87431c7dca7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();

    // --- PEER SETUP ---
    const peer = new Peer({ config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}});
    let currentUser = null;
    let activeConnections = [];

    // Check Auth State
    auth.onAuthStateChanged(user => {
        if (!user) {
            window.location.href = "index.html"; // Kick out if not logged in
        } else {
            currentUser = user;
            document.getElementById('citizen-name').innerText = user.displayName || "Citizen";
            document.getElementById('status').innerText = "Encrypted Connection Online";
            loadMessages();
        }
    });

    // --- MESSAGING LOGIC ---
    function sendMessage() {
        const text = document.getElementById('msg-input').value.trim();
        if (!text || !currentUser) return;

        const msgData = {
            user: currentUser.displayName || currentUser.email.split('@')[0],
            text: text,
            timestamp: Date.now()
        };

        // 1. Permanent Cloud Save
        rtdb.ref('messages').push(msgData);

        // 2. Direct P2P Relay (Optional but keeps it fast)
        activeConnections.forEach(c => { if(c.open) c.send(msgData); });

        document.getElementById('msg-input').value = '';
    }

    function loadMessages() {
        // Listen for new messages in RTDB
        rtdb.ref('messages').limitToLast(100).on('child_added', (snap) => {
            const data = snap.val();
            const isMe = data.user === (currentUser.displayName || currentUser.email.split('@')[0]);
            renderMsg(data.user, data.text, isMe ? 'sent' : 'received');
        });
    }

    function renderMsg(user, text, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<span class="msg-user">${user}</span>${text}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // --- PEER CONNECTIVITY ---
    peer.on('open', id => { document.getElementById('my-peer-id').innerText = "ID: " + id; });
    peer.on('connection', conn => setupPeer(conn));

    function connectToPeer() {
        const tid = document.getElementById('target-id').value.trim();
        if(tid) setupPeer(peer.connect(tid));
    }

    function setupPeer(conn) {
        activeConnections.push(conn);
        conn.on('data', data => renderMsg(data.user, data.text, 'received'));
    }

    function copyId() {
        const rawId = document.getElementById('my-peer-id').innerText.replace("ID: ", "");
        navigator.clipboard.writeText(rawId);
        alert("Citizen ID Copied!");
    }

    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
