<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom of 8th | Secure Comms</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        /* --- YOUR ORIGINAL UI STYLES --- */
        :root {
            --primary: #818cf8;
            --bg-main: #020617;
            --card-bg: rgba(30, 41, 59, 0.4);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        nav {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-container {
            display: flex;
            flex-grow: 1;
        }

        .sidebar {
            width: 280px;
            border-right: 1px solid var(--card-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 70%;
            margin: 5px 0;
            position: relative;
        }

        .sent {
            background: var(--primary);
            align-self: flex-end;
            color: #000;
        }

        .received {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            align-self: flex-start;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--card-border);
            display: flex;
            gap: 10px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            color: white;
            padding: 10px;
            border-radius: 10px;
            flex-grow: 1;
        }

        button {
            background: var(--primary);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom of 8th | Secure Comms</div>
        <div id="user-display" style="font-size: 14px; opacity: 0.8;">Syncing...</div>
    </nav>

    <div class="app-container">
        <div class="sidebar">
            <input type="text" id="target-id" placeholder="Friend's Citizen ID">
            <button onclick="connectToPeer()" style="margin-top:10px;">Link Peer</button>
            <div id="my-peer-id" style="font-size:10px; margin-top:20px; opacity:0.5; word-break: break-all; cursor: pointer;" onclick="copyId()">Your ID: Generating...</div>
        </div>

        <div style="flex-grow:1; display:flex; flex-direction:column;">
            <div id="chat-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyC9AQ8I79SzcOxhyT4-Z9qYVSr4Cv3njK0",
        authDomain: "kingdom-of-8th-79341.firebaseapp.com",
        databaseURL: "https://kingdom-of-8th-79341-default-rtdb.firebaseio.com",
        projectId: "kingdom-of-8th-79341",
        storageBucket: "kingdom-of-8th-79341.firebasestorage.app",
        messagingSenderId: "399956360550",
        appId: "1:399956360550:web:b498c38f52d87431c7dca7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const rtdb = firebase.database();
    const peer = new Peer({ config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}});

    let currentUser = null;
    let activeConnections = [];

    // 1. Verify Login & Identity
    auth.onAuthStateChanged(user => {
        if(!user) {
            window.location.href = "index.html"; 
        } else {
            currentUser = user;
            const name = user.displayName || user.email.split('@')[0];
            document.getElementById('user-display').innerText = "Citizen: " + name;
            loadChatHistory();
        }
    });

    // 2. Messaging Logic
    function sendMessage() {
        const text = document.getElementById('msg-input').value.trim();
        if(!text) return;

        const msgData = {
            user: currentUser.displayName || currentUser.email.split('@')[0],
            text: text,
            timestamp: Date.now()
        };

        // Save to Firebase (History)
        rtdb.ref('messages').push(msgData);
        
        // Push to P2P Peers (Instant)
        activeConnections.forEach(c => { if(c.open) c.send(msgData); });

        document.getElementById('msg-input').value = '';
    }

    function loadChatHistory() {
        rtdb.ref('messages').limitToLast(50).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const myName = currentUser.displayName || currentUser.email.split('@')[0];
            const type = (data.user === myName) ? 'sent' : 'received';
            renderMessage(data.user, data.text, type);
        });
    }

    function renderMessage(user, text, type) {
        const cb = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `<small style="display:block; font-size:9px; opacity:0.6;">${user}</small>${text}`;
        cb.appendChild(div);
        cb.scrollTop = cb.scrollHeight;
    }

    // 3. PeerJS Logic
    peer.on('open', id => { document.getElementById('my-peer-id').innerText = "Your ID: " + id; });
    peer.on('connection', conn => setupPeerEvents(conn));

    function connectToPeer() {
        const id = document.getElementById('target-id').value.trim();
        if(id) setupPeerEvents(peer.connect(id));
    }

    function setupPeerEvents(conn) {
        activeConnections.push(conn);
        conn.on('data', data => renderMessage(data.user, data.text, 'received'));
    }

    function copyId() {
        const id = document.getElementById('my-peer-id').innerText.replace("Your ID: ", "");
        navigator.clipboard.writeText(id);
        alert("ID Copied!");
    }

    // Enter Key Support
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
