<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Nexus Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f12;
            --side-bar: #16161a;
            --chat-bg: #1c1c21;
            --text-main: #e0e0e0;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --received-bg: #2e2f35;
            --success: #2ecc71;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { 
            width: 280px; background: var(--side-bar); padding: 20px; 
            display: flex; flex-direction: column; border-right: 1px solid #2a2a2a;
        }
        .sidebar h2 { font-size: 1rem; margin: 0 0 20px 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        
        .id-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; font-weight: 600; }
        .my-id-box { 
            background: #2a2a2e; padding: 12px; border-radius: 8px; font-family: monospace; 
            font-size: 0.75rem; margin-bottom: 20px; cursor: pointer; border: 1px solid #333; 
            transition: all 0.2s; position: relative; overflow: hidden; text-overflow: ellipsis;
        }
        .my-id-box:hover { border-color: var(--accent); background: #323238; }
        .my-id-box:active { transform: scale(0.98); }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        input { background: #2a2a2e; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background: var(--accent-hover); }
        button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }

        /* Member List */
        .member-section { flex-grow: 1; overflow-y: auto; }
        .member-section h3 { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .member-item { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin-bottom: 12px; color: #ccc; }
        .status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); }

        /* Main Chat */
        .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }

        /* Bubbles */
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; animation: slideIn 0.2s ease-out; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-label { font-size: 0.7rem; font-weight: 700; display: block; margin-bottom: 4px; color: var(--accent); }
        .sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .sent .user-label { color: #fff; opacity: 0.8; }
        .received { align-self: flex-start; background: var(--received-bg); border-bottom-left-radius: 4px; }
        .system { align-self: center; background: rgba(255,255,255,0.05); color: #888; font-size: 0.75rem; border-radius: 20px; padding: 5px 15px; }

        .message-input-area { padding: 20px; background: var(--side-bar); border-top: 1px solid #2a2a2a; display: flex; gap: 12px; }
        #msg-input { flex-grow: 1; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h2>Dallas's P2P Chat</h2>
        <div class="id-label">YOUR ADDRESS</div>
        <div class="my-id-box" id="my-id" title="Click to copy">Connecting...</div>

        <div class="input-group">
            <input type="text" id="username" placeholder="Display Name" maxlength="15">
            <input type="text" id="join-id" placeholder="Paste Host ID to join">
            <button id="action-btn">Connect to Peer</button>
        </div>
        
        <div class="member-section">
            <h3>Online — <span id="member-count">0</span></h3>
            <div id="member-list"></div>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-box">
            <div class="msg system">Establishing decentralized connection...</div>
        </div>
        <div class="message-input-area">
            <input type="text" id="msg-input" placeholder="Message members..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    const peer = new Peer();
    let connections = [];
    let members = {}; 
    let isHost = true;

    const myIdDisplay = document.getElementById('my-id');
    const chatBox = document.getElementById('chat-box');
    const memberListUI = document.getElementById('member-list');
    const usernameInput = document.getElementById('username');
    const msgInput = document.getElementById('msg-input');
    const actionBtn = document.getElementById('action-btn');

    // Init Peer
    peer.on('open', id => {
        myIdDisplay.innerText = id;
        addMessage(null, "System: Ready. Share your ID or join another.", "system");
    });

    // Copy UI
    myIdDisplay.onclick = () => {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        const originalText = myIdDisplay.innerText;
        myIdDisplay.innerText = "Copied to Clipboard!";
        setTimeout(() => { myIdDisplay.innerText = originalText; }, 1500);
    };

    // --- CONNECTION LOGIC ---

    // When someone connects to US
    peer.on('connection', conn => {
        isHost = true;
        setupConnection(conn);
    });

    // When WE connect to someone else
    actionBtn.onclick = () => {
        const targetId = document.getElementById('join-id').value.trim();
        if (!targetId || targetId === peer.id) return;
        
        isHost = false;
        const conn = peer.connect(targetId);
        setupConnection(conn);
        actionBtn.disabled = true;
        actionBtn.innerText = "Connected";
    };

    function setupConnection(conn) {
        conn.on('open', () => {
            if (!connections.find(c => c.peer === conn.peer)) {
                connections.push(conn);
            }
            
            const myName = usernameInput.value || "Guest_" + peer.id.substring(0,4);
            conn.send({ type: 'HELO', user: myName });

            conn.on('data', data => {
                handleData(conn, data);
            });
        });

        conn.on('close', () => {
            delete members[conn.peer];
            connections = connections.filter(c => c.peer !== conn.peer);
            if (isHost) {
                broadcastMembers();
            } else {
                updateMemberList();
            }
        });
    }

    function handleData(conn, data) {
        switch(data.type) {
            case 'HELO':
                members[conn.peer] = data.user;
                if (isHost) {
                    broadcastMembers();
                    addMessage(null, `${data.user} joined the chat`, "system");
                }
                updateMemberList();
                break;
            
            case 'CHAT':
                addMessage(data.user, data.text, "received");
                if (isHost) relayMessage(conn.peer, data);
                break;

            case 'MEMBER_LIST':
                members = data.list;
                updateMemberList();
                break;
        }
    }

    // --- HELPERS ---

    function broadcastMembers() {
        const myName = usernameInput.value || "Host";
        const list = { ...members, [peer.id]: myName };
        connections.forEach(c => {
            if (c.open) c.send({ type: 'MEMBER_LIST', list });
        });
        updateMemberList(list);
    }

    function relayMessage(senderId, data) {
        connections.forEach(c => {
            if (c.peer !== senderId && c.open) c.send(data);
        });
    }

    function updateMemberList(externalList = null) {
        const listToUse = externalList || members;
        memberListUI.innerHTML = '';
        const names = Object.values(listToUse);
        document.getElementById('member-count').innerText = names.length;
        
        names.forEach(name => {
            const el = document.createElement('div');
            el.className = 'member-item';
            el.innerHTML = `<div class="status-dot"></div> ${name}`;
            memberListUI.appendChild(el);
        });
    }

    function sendMessage() {
        const text = msgInput.value.trim();
        const user = usernameInput.value || "Guest";
        if (!text) return;

        const data = { type: 'CHAT', user, text };
        
        // Send to everyone if host, or just to host if peer
        connections.forEach(c => {
            if (c.open) c.send(data);
        });

        addMessage("Me", text, "sent");
        msgInput.value = "";
        msgInput.focus();
    }

    function addMessage(user, text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (type === 'system') {
            div.innerText = text;
        } else {
            div.innerHTML = `<span class="user-label">${user}</span>${escapeHTML(text)}`;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    document.getElementById('send-btn').onclick = sendMessage;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
</script>
</body>
</html>
