<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Chats | Kingdom of 8th Period</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8; --primary-hover: #6366f1; --bg-main: #020617;
            --surface-bg: rgba(30, 41, 59, 0.4); --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #f59e0b; --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main);
            color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.12) 0%, transparent 40%);
        }

        nav {
            background: rgba(2, 6, 23, 0.6); backdrop-filter: blur(20px);
            padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--card-border);
        }

        .nav-logo {
            font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(135deg, #e2e8f0 0%, var(--primary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .nav-links a { text-decoration: none; color: var(--text-muted); font-weight: 600; margin-left: 1.5rem; transition: 0.3s;}
        .nav-links a:hover { color: var(--text-main); }

        .chat-wrapper { display: flex; gap: 24px; padding: 24px; max-width: 1200px; margin: 0 auto; width: 100%; height: calc(100vh - 70px); }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 320px; background: var(--surface-bg); border: 1px solid var(--card-border);
            border-radius: 20px; padding: 24px 0; backdrop-filter: blur(12px); display: flex; flex-direction: column;
        }

        .sidebar-header { padding: 0 24px 16px; border-bottom: 1px solid var(--card-border); margin-bottom: 16px; }
        .sidebar-header h3 { font-size: 1.1rem; color: var(--text-main); margin-bottom: 8px;}
        .identity-badge {
            background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3);
            color: var(--accent); padding: 8px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 0.8rem; margin-bottom: 15px;
        }

        .btn-new-group {
            width: 100%; background: var(--primary); color: #020617; border: none; padding: 10px;
            border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;
        }
        .btn-new-group:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .contacts-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .contact-item {
            padding: 16px; border-radius: 12px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; gap: 4px; border: 1px solid transparent;
        }
        .contact-item:hover { background: rgba(255, 255, 255, 0.05); }
        .contact-item.active { background: rgba(129, 140, 248, 0.15); border-color: rgba(129, 140, 248, 0.3); }
        .contact-name { font-weight: 700; font-size: 1rem; color: var(--text-main); }
        .contact-rank { font-size: 0.75rem; color: var(--text-muted); }

        /* --- CHAT AREA --- */
        .chat-main {
            flex: 1; background: var(--surface-bg); border: 1px solid var(--card-border);
            border-radius: 20px; backdrop-filter: blur(12px); display: flex; flex-direction: column; overflow: hidden;
        }

        .chat-header {
            padding: 20px 24px; border-bottom: 1px solid var(--card-border); background: rgba(0,0,0,0.2);
            font-weight: 700; font-size: 1.1rem;
        }

        #chat-box { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        
        .msg-wrapper { display: flex; flex-direction: column; gap: 4px; max-width: 75%; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.them { align-self: flex-start; align-items: flex-start; }

        .sender-name { font-size: 0.75rem; color: var(--text-muted); padding: 0 4px; font-weight: 600; }
        .message { padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .message.system { background: transparent; color: var(--text-muted); align-self: center; text-align: center; font-style: italic; font-size: 0.85rem; max-width: 100%;}
        .message.them { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15); border-bottom-left-radius: 4px;}
        .message.me { background: var(--primary); color: #020617; font-weight: 500; border-bottom-right-radius: 4px; }

        .input-area { padding: 20px; border-top: 1px solid var(--card-border); display: flex; gap: 12px; background: rgba(0,0,0,0.2); }
        .input-area input { flex: 1; padding: 14px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--card-border); border-radius: 10px; color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: 0.2s;}
        .input-area input:focus { border-color: var(--primary); }
        .input-area button { padding: 0 24px; background: var(--primary); color: #020617; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit;}
        .input-area button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- MODAL (POPUP) STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #0f172a; border: 1px solid var(--card-border); padding: 30px;
            border-radius: 20px; width: 400px; max-width: 90%; max-height: 80vh; display: flex; flex-direction: column;
        }
        .modal h2 { margin-bottom: 20px; font-size: 1.5rem; }
        .modal input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--card-border); border-radius: 8px; color: white;
        }
        .citizen-checklist {
            flex: 1; overflow-y: auto; border: 1px solid var(--card-border); border-radius: 8px;
            padding: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); max-height: 200px;
        }
        .checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; }
        .checklist-item:hover { background: rgba(255,255,255,0.05); border-radius: 5px;}
        .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .btn-cancel { background: transparent; color: white; border: 1px solid var(--card-border); padding: 10px 20px; border-radius: 8px; cursor: pointer;}
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom Messages</div>
        <div class="nav-links">
            <a href="index.html">Portal</a>
            <a href="news.html">News</a>
            <a href="ranks.html">Ranks</a>
            <a href="economy.html">Economy</a>
            <a href="#" onclick="logout()">Disconnect</a>
        </div>
    </nav>

    <div class="chat-wrapper">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Your Identity</h3>
                <div class="identity-badge" id="display-name">Verifying...</div>
                <button class="btn-new-group" onclick="openModal()">+ Create New Group</button>
            </div>
            <div class="sidebar-header" style="border: none; padding-bottom: 0;">
                <h3 style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">Your Groups</h3>
            </div>
            <div class="contacts-list" id="groups-list">
                <div style="padding: 16px; color: var(--text-muted); text-align: center; font-size: 0.9rem;">Loading groups...</div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header" id="chat-header">Select a group to begin messaging</div>
            <div id="chat-box">
                <div class="message system">Select or create a group chat to view messages.</div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Type a message..." disabled onkeypress="handleEnter(event)">
                <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="group-modal">
        <div class="modal">
            <h2>Create New Group</h2>
            <input type="text" id="new-group-name" placeholder="Group Name (e.g. The Royal Guard)">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">Select citizens to invite:</p>
            <div class="citizen-checklist" id="citizen-checklist">
                </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-new-group" style="width: auto; padding: 10px 20px;" onclick="createGroup()">Create</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIsdB35U2clkR3b8bYdWNxRI14A9aGj-k",
            authDomain: "chatting-kingdom.firebaseapp.com",
            databaseURL: "https://chatting-kingdom-default-rtdb.firebaseio.com",
            projectId: "chatting-kingdom",
            storageBucket: "chatting-kingdom.firebasestorage.app",
            messagingSenderId: "159434733757",
            appId: "1:159434733757:web:e86256ba72525c0830dfd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserName = "";
        let currentGroupId = null;
        let unsubscribeChat = null; 

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; } 
            else {
                currentUser = user;
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        currentUserName = data.name;
                        document.getElementById('display-name').innerText = `${data.name} [${data.rank}]`;
                        loadMyGroups(); 
                        populateCitizenChecklist();
                    }
                } catch (error) { console.error(error); }
            }
        });

        window.logout = () => signOut(auth).then(() => { window.location.href = "index.html"; });

        // --- MODAL CONTROLS ---
        window.openModal = () => document.getElementById('group-modal').style.display = 'flex';
        window.closeModal = () => {
            document.getElementById('group-modal').style.display = 'none';
            document.getElementById('new-group-name').value = '';
            document.querySelectorAll('.citizen-checkbox').forEach(cb => cb.checked = false);
        };

        // --- LOAD CITIZENS FOR THE CHECKLIST ---
        async function populateCitizenChecklist() {
            const checklist = document.getElementById('citizen-checklist');
            checklist.innerHTML = ""; 
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                querySnapshot.forEach((docSnap) => {
                    if (docSnap.id === currentUser.uid) return; // don't list yourself
                    const data = docSnap.data();
                    
                    const label = document.createElement('label');
                    label.className = 'checklist-item';
                    label.innerHTML = `
                        <input type="checkbox" class="citizen-checkbox" value="${docSnap.id}">
                        <span>${data.name} (${data.rank})</span>
                    `;
                    checklist.appendChild(label);
                });
            } catch (error) { console.error(error); }
        }

        // --- CREATE A NEW GROUP ---
        window.createGroup = async () => {
            const nameInput = document.getElementById('new-group-name').value.trim();
            if (!nameInput) return alert("Please enter a group name!");

            // Gather selected UIDs and add the current user
            const selectedBoxes = document.querySelectorAll('.citizen-checkbox:checked');
            const members = [currentUser.uid]; 
            selectedBoxes.forEach(box => members.push(box.value));

            if (members.length < 2) return alert("You must select at least one other citizen!");

            try {
                await addDoc(collection(db, "group_chats"), {
                    name: nameInput,
                    members: members,
                    createdAt: serverTimestamp(),
                    createdBy: currentUser.uid
                });
                closeModal();
            } catch (error) { console.error("Error creating group:", error); alert("Failed to create group."); }
        };

        // --- LOAD GROUPS I AM IN ---
        function loadMyGroups() {
            const groupsList = document.getElementById('groups-list');
            
            // Query: Find all group_chats where MY uid is inside the 'members' array
            const q = query(collection(db, "group_chats"), where("members", "array-contains", currentUser.uid));
            
            onSnapshot(q, (snapshot) => {
                groupsList.innerHTML = ""; 
                if (snapshot.empty) {
                    groupsList.innerHTML = `<div style="padding: 16px; color: var(--text-muted); text-align: center; font-size: 0.85rem;">You are not in any groups yet.</div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const groupData = docSnap.data();
                    const groupId = docSnap.id;

                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'contact-item';
                    groupDiv.id = `group-${groupId}`;
                    groupDiv.innerHTML = `
                        <div class="contact-name">${groupData.name}</div>
                        <div class="contact-rank">${groupData.members.length} Members</div>
                    `;
                    groupDiv.onclick = () => openGroupChat(groupId, groupData.name);
                    groupsList.appendChild(groupDiv);
                });
            });
        }

        // --- OPEN A SPECIFIC GROUP CHAT ---
        window.openGroupChat = (groupId, groupName) => {
            document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`group-${groupId}`).classList.add('active');
            document.getElementById('chat-header').innerHTML = `Group: <strong>${groupName}</strong>`;
            
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('message-input').focus();

            currentGroupId = groupId;
            listenForMessages();
        };

        // --- LISTEN FOR GROUP MESSAGES ---
        function listenForMessages() {
            const chatBox = document.getElementById('chat-box');
            if (unsubscribeChat) unsubscribeChat();

            const messagesRef = collection(db, "group_chats", currentGroupId, "messages");
            const q = query(messagesRef, orderBy("timestamp", "asc"));

            unsubscribeChat = onSnapshot(q, (snapshot) => {
                chatBox.innerHTML = ""; 
                
                if(snapshot.empty) {
                    chatBox.innerHTML = `<div class="message system">This is the beginning of the group chat.</div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const msgData = docSnap.data();
                    const isMe = msgData.senderId === currentUser.uid;

                    const wrapperDiv = document.createElement('div');
                    wrapperDiv.className = `msg-wrapper ${isMe ? 'me' : 'them'}`;
                    
                    // Show who sent the message if it's not you
                    if (!isMe) {
                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'sender-name';
                        nameDiv.innerText = msgData.senderName || "Unknown";
                        wrapperDiv.appendChild(nameDiv);
                    }

                    const bubbleDiv = document.createElement('div');
                    bubbleDiv.className = `message ${isMe ? 'me' : 'them'}`;
                    bubbleDiv.innerText = msgData.text; 
                    
                    wrapperDiv.appendChild(bubbleDiv);
                    chatBox.appendChild(wrapperDiv);
                });

                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        // --- SEND A MESSAGE ---
        window.sendMessage = async () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentGroupId) return;

            input.value = ""; 

            try {
                await addDoc(collection(db, "group_chats", currentGroupId, "messages"), {
                    text: text,
                    senderId: currentUser.uid,
                    senderName: currentUserName, // Save name so others see who spoke
                    timestamp: serverTimestamp()
                });
            } catch (error) { console.error("Error sending message: ", error); }
        };

        window.handleEnter = (e) => {
            if (e.key === 'Enter') sendMessage();
        };
    </script>
</body>
</html>
