<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Square | Kingdom of 8th Period</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.25);
            --bg-main: #020617;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 50% 10%, rgba(129, 140, 248, 0.05) 0%, transparent 60%);
        }

        /* Navigation */
        nav {
            background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(20px);
            padding: 1.25rem 5%; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--card-border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--text-main); }

        /* Main Chat Area */
        .chat-container {
            max-width: 900px; margin: 40px auto; flex-grow: 1; display: flex; flex-direction: column;
            width: 100%; padding: 0 20px; height: calc(100vh - 120px);
        }

        .chat-header {
            text-align: center; margin-bottom: 20px; animation: slideDown 0.5s ease-out;
        }
        .chat-header h1 { font-size: 2.5rem; color: var(--text-main); margin-bottom: 5px; }
        .chat-header p { color: var(--text-muted); font-size: 1rem; }

        .chat-box {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 20px; flex-grow: 1; display: flex; flex-direction: column;
            overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .messages-area {
            flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }

        /* Message Bubbles */
        .message {
            max-width: 75%; display: flex; flex-direction: column; animation: slideUp 0.3s ease-out;
        }
        .message.other { align-self: flex-start; }
        .message.mine { align-self: flex-end; align-items: flex-end; }

        .sender-name {
            font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; padding: 0 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .mine .sender-name { color: var(--accent); }

        .bubble {
            padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word;
        }
        .other .bubble {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border);
            border-bottom-left-radius: 4px;
        }
        .mine .bubble {
            background: var(--primary); color: #020617; font-weight: 500;
            border-bottom-right-radius: 4px; box-shadow: 0 4px 15px var(--primary-glow);
        }

        /* Input Area */
        .input-area {
            display: flex; gap: 10px; padding: 20px; background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--card-border);
        }
        .input-area input {
            flex-grow: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--card-border);
            padding: 15px 20px; border-radius: 50px; color: var(--text-main); font-family: inherit;
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-area input:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); }
        
        .btn-send {
            background: var(--primary); color: #020617; border: none; padding: 0 25px;
            border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.3s; font-family: inherit;
        }
        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--primary-glow); }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar styling */
        .messages-area::-webkit-scrollbar { width: 8px; }
        .messages-area::-webkit-scrollbar-track { background: transparent; }
        .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .messages-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">Kingdom of 8th</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="news.html">News</a>
            <a href="chat.html">Private Chat</a>
            <a href="townsquare.html" style="color: var(--text-main);">Town Square</a>
            <a href="economy.html">Economy</a>
            <a href="admin.html" id="nav-admin-link" style="color: var(--accent); display: none;">Admin Panel</a>
        </div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <h1>The Town Square</h1>
            <p>A public gathering place for all citizens to speak freely.</p>
        </div>

        <div class="chat-box">
            <div class="messages-area" id="messages-area">
                </div>
            
            <form class="input-area" id="send-form">
                <input type="text" id="message-input" placeholder="Declare something to the Kingdom..." autocomplete="off" required>
                <button type="submit" class="btn-send">Send</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCIsdB35U2clkR3b8bYdWNxRI14A9aGj-k",
            authDomain: "chatting-kingdom.firebaseapp.com",
            databaseURL: "https://chatting-kingdom-default-rtdb.firebaseio.com",
            projectId: "chatting-kingdom",
            storageBucket: "chatting-kingdom.firebasestorage.app",
            messagingSenderId: "159434733757",
            appId: "1:159434733757:web:e86256ba72525c0830dfd4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserName = "Anonymous Citizen";

        // 1. Verify Login & Role
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                try {
                    // Fetch their profile to get their name and check admin status
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        currentUserName = data.name || "Citizen";
                        
                        // Un-hide Admin Link if applicable
                        if (data.role === "web team") {
                            document.getElementById('nav-admin-link').style.display = "inline";
                        }
                    }
                } catch (error) { console.error("Error fetching user data:", error); }
                
                // Start listening to the public chat
                loadMessages();
            } else {
                // If not logged in, boot them to home
                window.location.href = "index.html";
            }
        });

        // 2. Load Messages in Real-Time
        function loadMessages() {
            const q = query(collection(db, "town_square"), orderBy("timestamp", "asc"));
            const messagesArea = document.getElementById('messages-area');

            onSnapshot(q, (snapshot) => {
                messagesArea.innerHTML = ""; // Clear area to prevent duplicates
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMine = data.senderId === currentUser.uid;
                    
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${isMine ? 'mine' : 'other'}`;
                    
                    // Format: "Name" above the bubble
                    messageDiv.innerHTML = `
                        <div class="sender-name">${isMine ? 'You' : data.senderName}</div>
                        <div class="bubble">${data.text}</div>
                    `;
                    
                    messagesArea.appendChild(messageDiv);
                });
                
                // Auto-scroll to the bottom
                messagesArea.scrollTop = messagesArea.scrollHeight;
            });
        }

        // 3. Send a Message
        document.getElementById('send-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputField = document.getElementById('message-input');
            const text = inputField.value.trim();

            if (text && currentUser) {
                inputField.value = ""; // clear input instantly for better UX
                try {
                    await addDoc(collection(db, "town_square"), {
                        text: text,
                        senderId: currentUser.uid,
                        senderName: currentUserName,
                        timestamp: serverTimestamp()
                    });
                } catch (error) {
                    console.error("Error sending message: ", error);
                    alert("Failed to send message.");
                }
            }
        });
    </script>
</body>
</html>
